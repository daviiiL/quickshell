<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Keybind Hints — Preview</title>
<style>
  :root {
    /* surfaces */
    --bar-bg: #0a0a0a;
    --panel-bg: #141218;
    --surface-container-lowest: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container: #211f26;
    --surface-container-high: #2b2930;

    /* text */
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;

    /* lines */
    --hair: #272727;
    --hair-hot: #3a3a3a;

    /* accents / status */
    --accent: #e3e3e3;
    --bar-accent: #e3e3e3;
    --live: #5dc70a;
    --warn: #ffd4ab;
    --err: #f2b8b5;

    /* desktop backdrop */
    --desktop-base: #07070a;
    --desktop-warm: #1a1820;
    --desktop-cool: #121016;

    /* geometry */
    --panel-w: 320px;
    --bar-h: 48px;
    --radius-sm: 3px;
    --radius-md: 4px;
    --hair-w: 1px;
    --strip-h: 40px;

    /* font scale — mirrors common/Theme.qml FontSize (offset = 0) */
    --font-xxs: 7px;
    --font-xs: 10px;
    --font-sm: 12px;
    --font-md: 14px;
    --font-lg: 16px;
    --font-xl: 18px;
    --font-xxl: 20px;
  }

  :root[data-theme="light"] {
    /* surfaces — off-white with subtle violet warmth */
    --bar-bg: #e4e0e9;
    --panel-bg: #f5f2f7;
    --surface-container-lowest: #fbf9fc;
    --surface-container-low: #eee9f0;
    --surface-container: #e3dee6;
    --surface-container-high: #d4cfd9;

    /* text — inverted 4-step ramp, violet-black ink */
    --ink: #1c1820;
    --ink-dim: #5b5764;
    --ink-dimmer: #827e8a;
    --ink-faint: #a8a4b0;

    /* lines — soft greys that still read as hair */
    --hair: #d6d1dc;
    --hair-hot: #bcb7c2;

    /* accents — inverted: dark ink instead of near-white */
    --accent: #1c1820;
    --bar-accent: #1c1820;

    /* status — darkened / desaturated for light-bg contrast */
    --live: #3d8f0a;
    --warn: #a65a1c;
    --err: #b3261e;

    /* desktop backdrop — neutral paper gradient */
    --desktop-base: #dcd7e0;
    --desktop-warm: #ebe6ee;
    --desktop-cool: #d4d7dc;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 20% 30%, var(--desktop-warm) 0%, transparent 60%),
      radial-gradient(900px 500px at 80% 80%, var(--desktop-cool) 0%, transparent 60%),
      var(--desktop-base);
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* fixed top preview-chrome strip */
  .strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--strip-h);
    background: var(--bar-bg);
    border-bottom: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 1000;
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .strip h1 {
    margin: 0;
    font-size: var(--font-xs);
    font-weight: 500;
    color: var(--ink-dimmer);
    letter-spacing: 0.18em;
  }
  .strip .pills {
    display: flex;
    gap: 6px;
  }
  .toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    height: 24px;
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-sm);
    color: var(--ink-dimmer);
    cursor: pointer;
    user-select: none;
    background: transparent;
    transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
  }
  .toggle input { display: none; }
  .toggle:has(input:checked) {
    background: var(--surface-container-low);
    color: var(--ink);
    border-color: var(--hair-hot);
  }
  .toggle:has(input:checked)::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
  }
  .toggle .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
  }
  .strip .sep {
    width: var(--hair-w);
    align-self: stretch;
    background: var(--hair);
    margin: 0 10px;
  }

  /* canvas wrapper — provides coord space below the strip */
  .canvas {
    position: relative;
    margin-top: var(--strip-h);
    height: calc(100vh - var(--strip-h));
    overflow: hidden;
  }

  /* bottom bar (context only) */
  body[data-surface-bar="on"] .bar { display: flex; }
  .bar {
    display: none;
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: var(--bar-h);
    background: var(--bar-bg);
    border-top: var(--hair-w) solid var(--hair);
    align-items: stretch;
    padding: 0 8px;
    gap: 4px;
    z-index: 50;
  }
  .bar::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: var(--hair-w);
    width: 220px;
    background: linear-gradient(to right, rgba(227,227,227,0.55), transparent);
  }
  .bar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    height: calc(var(--bar-h) - 12px);
    align-self: center;
    border: var(--hair-w) solid transparent;
    border-radius: var(--radius-sm);
    color: var(--ink-dim);
    font-size: var(--font-xs);
    letter-spacing: 0.06em;
    cursor: pointer;
    background: transparent;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .bar-btn:hover { background: var(--surface-container-low); border-color: var(--hair); color: var(--ink); }
  .bar-btn .glyph { opacity: 0.56; display: grid; place-items: center; }
  .bar-btn:hover .glyph { opacity: 1; }
  .bar-spacer { flex: 1; }

  /* scrim */
  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 60;
    display: none;
  }
  body[data-surface-overlay="on"] .scrim { display: block; }

  /* keybind-hints overlay */
  .keybind-hints {
    position: absolute;
    left: 50%;
    top: 18%;
    transform: translateX(-50%);
    width: 460px;
    background: var(--panel-bg);
    border: 1px solid var(--hair);
    border-radius: var(--radius-md);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 2px 0 rgba(255,255,255,0.02) inset;
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 70;
    animation: fade-in-scale 260ms cubic-bezier(.2,0,0,1);
  }
  body[data-surface-overlay="on"] .keybind-hints { display: flex; }

  /* accent edge streak top-left */
  .keybind-hints::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 180px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
    pointer-events: none;
  }

  @keyframes fade-in-scale {
    from { opacity: 0; transform: translateX(-50%) scale(0.97); }
    to { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  /* header */
  .kb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    border-bottom: var(--hair-w) solid var(--hair);
  }
  .kb-title-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .kb-title {
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
    font-weight: 500;
  }
  .kb-state {
    font-size: var(--font-xs);
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  .kb-meta {
    font-size: var(--font-xs);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  /* scrollable body */
  .kb-body {
    max-height: 56vh;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .kb-body::-webkit-scrollbar { width: 6px; }
  .kb-body::-webkit-scrollbar-track { background: transparent; }
  .kb-body::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 3px; }
  .kb-body::-webkit-scrollbar-thumb:hover { background: var(--hair-hot); }

  /* section */
  .kb-section { border-bottom: var(--hair-w) solid var(--hair); }
  .kb-section:last-child { border-bottom: none; }
  .kb-section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
  }
  .kb-section-title {
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
    font-weight: 500;
  }
  .kb-section-count {
    font-size: var(--font-xs);
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }

  /* row */
  .kb-row {
    padding: 10px 16px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
    border-top: 1px solid transparent;
  }
  .kb-row + .kb-row { border-top-color: var(--hair); }
  .kb-row:hover { background: var(--surface-container-low); }
  .kb-row:hover .kbd-chip { border-color: var(--hair-hot); }

  /* kbd chip */
  .kbd-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid var(--hair);
    border-radius: var(--radius-sm);
    font-size: var(--font-xs);
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    background: transparent;
    transition: border-color 120ms ease, color 120ms ease;
  }

  /* action label */
  .kb-label {
    font-size: var(--font-md);
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1.4;
  }
  .kb-label .kb-sub {
    color: var(--ink-dim);
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 500;
  }

  /* footer */
  .kb-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 16px;
    border-top: var(--hair-w) solid var(--hair);
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .kb-footer .group { display: flex; gap: 14px; align-items: center; }
  .kb-footer .pair { display: flex; gap: 6px; align-items: center; }
  .kb-footer .pair .kbd-chip { margin-right: 4px; }
  .kb-footer .kbd-chip:last-child { margin-right: 0; }

  /* SVG baseline */
  svg { display: block; }
</style>
</head>
<body>

  <header class="strip">
    <h1>keybind-hints.html</h1>
    <div class="pills">
      <label class="toggle"><input type="checkbox" data-surface="overlay" checked><span class="dot"></span>overlay</label>
      <label class="toggle"><input type="checkbox" data-surface="bar" checked><span class="dot"></span>bar</label>
      <span class="sep"></span>
      <label class="toggle"><input type="checkbox" data-theme-toggle><span class="dot"></span>light</label>
    </div>
  </header>

  <div class="canvas">
    <nav class="bar" aria-label="Main bar">
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/>
          </svg>
        </span>
      </div>
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="8" width="18" height="8" rx="1.5"/><line x1="22" y1="11" x2="22" y2="13"/>
          </svg>
        </span>
        72%
      </div>
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4"/>
          </svg>
        </span>
        60%
      </div>
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" fill-opacity="0.15"/>
            <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
            <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
          </svg>
        </span>
        42%
      </div>
      <div class="bar-spacer"></div>
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 8.5a17 17 0 0 1 20 0"/>
            <path d="M5 12a13 13 0 0 1 14 0"/>
            <path d="M8.5 15.5a8 8 0 0 1 7 0"/>
            <circle cx="12" cy="19" r="1"/>
          </svg>
        </span>
        home-wifi 84%
      </div>
      <div class="bar-btn">
        <span class="glyph">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 16V11a6 6 0 0 1 12 0v5l2 2H4l2-2z"/>
            <path d="M10 20a2 2 0 0 0 4 0"/>
          </svg>
        </span>
      </div>
    </nav>

    <div class="scrim"></div>

    <div class="keybind-hints" role="dialog" aria-label="Important Hotkeys">
      <!-- header -->
      <div class="kb-header">
        <div class="kb-title-row">
          <div class="kb-title">important hotkeys</div>
          <div class="kb-state">· niri</div>
        </div>
        <div class="kb-meta" id="totalBindCount">27 binds</div>
      </div>

      <!-- scrollable body -->
      <div class="kb-body" id="kbBody"></div>

      <!-- footer -->
      <div class="kb-footer">
        <div class="kb-footer-right">
          <div class="group">
            <div class="pair">
              <span class="kbd-chip">super</span>
              <span class="kbd-chip">shift</span>
              <span class="kbd-chip">/</span>
              <span>toggle</span>
            </div>
            <div class="pair">
              <span class="kbd-chip">esc</span>
              <span>close</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Data model - structured for direct mapping to future QML parser output
  const SECTIONS = [
    {
      name: 'shell',
      rows: [
        { keys: ['super', 'shift', '/'], label: 'show important hotkeys' },
        { keys: ['super', 'space'], label: 'application launcher' },
        { keys: ['super', 'ctrl', 'v'], label: 'clipboard history' },
        { keys: ['ctrl', 'space'], label: 'switch input method' },
        { keys: ['super', '\u21b5'], label: 'terminal \u00b7 ghostty' },
        { keys: ['super', 'ctrl', 'q'], label: 'lock screen' }
      ]
    },
    {
      name: 'windows',
      rows: [
        { keys: ['super', 'q'], label: 'close window' },
        { keys: ['super', '\u2190/\u2192'], label: 'focus column' },
        { keys: ['super', '\u2191/\u2193'], label: 'focus window' },
        { keys: ['super', 'ctrl', '\u2190/\u2192'], label: 'move column' },
        { keys: ['super', 'v'], label: 'toggle floating' },
        { keys: ['super', 'shift', 'v'], label: 'focus floating ↔ tiling' }
      ]
    },
    {
      name: 'workspaces',
      rows: [
        { keys: ['super', 'alt', '\u2193/\u2191'], label: 'switch workspace' },
        { keys: ['super', 'alt', 'shift', '\u2193/\u2191'], label: 'move column to workspace' },
        { keys: ['super', '1\u20139'], label: 'focus workspace by index' },
        { keys: ['super', 'ctrl', '1\u20139'], label: 'move column to workspace' }
      ]
    },
    {
      name: 'columns',
      rows: [
        { keys: ['super', 'r'], label: 'preset column widths' },
        { keys: ['super', 'f'], label: 'maximize column' },
        { keys: ['super', 'shift', 'f'], label: 'fullscreen window' },
        { keys: ['super', 'c'], label: 'center column' },
        { keys: ['super', '[/]'], label: 'consume / expel window' },
        { keys: ['super', '\u2212/='], label: 'column width \u00b110%' }
      ]
    },
    {
      name: 'session',
      rows: [
        { keys: ['prtsc'], label: 'screenshot' },
        { keys: ['super', 'shift', 'e'], label: 'exit niri' },
        { keys: ['super', 'shift', 'p'], label: 'power off monitors' },
        { keys: ['super', 'esc'], label: 'shortcut inhibit' },
        { keys: ['vol \u00b1', 'bright \u00b1'], label: 'media \u00b7 volume \u0026 brightness' }
      ]
    }
  ];

  // ── Helper: render chip(s) for a row ──────────────────────────────────
  function renderChips(keys) {
    const container = document.createElement('div');
    container.style.display = 'flex';
    container.style.gap = '4px';
    
    keys.forEach(key => {
      const chip = document.createElement('span');
      chip.className = 'kbd-chip';
      chip.textContent = key;
      container.appendChild(chip);
    });
    
    return container;
  }

  // ── Helper: render action label ───────────────────────────────────────
  function renderLabel(label) {
    const parts = label.split(' \u00b7 ');
    const main = parts[0];
    const sub = parts.slice(1).join(' \u00b7 ');
    
    const container = document.createElement('div');
    container.className = 'kb-label';
    
    container.textContent = main;
    
    if (sub) {
      const subSpan = document.createElement('span');
      subSpan.className = 'kb-sub';
      subSpan.textContent = sub;
      container.appendChild(subSpan);
    }
    
    return container;
  }

  // ── Build the overlay content ─────────────────────────────────────────
  function buildOverlay() {
    const body = document.getElementById('kbBody');
    let totalCount = 0;

    SECTIONS.forEach(section => {
      totalCount += section.rows.length;

      // Create section
      const sectionEl = document.createElement('div');
      sectionEl.className = 'kb-section';

      // Section head
      const head = document.createElement('div');
      head.className = 'kb-section-head';
      
      const title = document.createElement('div');
      title.className = 'kb-section-title';
      title.textContent = section.name;
      
      const count = document.createElement('div');
      count.className = 'kb-section-count';
      count.textContent = section.rows.length;
      
      head.appendChild(title);
      head.appendChild(count);
      sectionEl.appendChild(head);

      // Rows
      section.rows.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'kb-row';

        const chips = renderChips(row.keys);
        const label = renderLabel(row.label);

        rowEl.appendChild(chips);
        rowEl.appendChild(label);
        sectionEl.appendChild(rowEl);
      });

      body.appendChild(sectionEl);
    });

    // Update counts
    document.getElementById('totalBindCount').textContent = totalCount + ' binds';
  }

  // ── Toggle handlers ───────────────────────────────────────────────────
  function initToggles() {
    // Strip toggles
    document.querySelectorAll('[data-surface]').forEach(toggle => {
      toggle.addEventListener('change', (e) => {
        const surface = e.target.dataset.surface;
        if (e.target.checked) {
          document.body.setAttribute(`data-surface-${surface}`, 'on');
        } else {
          document.body.removeAttribute(`data-surface-${surface}`);
        }
      });
      // Sync initial state from checkbox's checked property
      const surface = toggle.dataset.surface;
      if (toggle.checked) {
        document.body.setAttribute(`data-surface-${surface}`, 'on');
      } else {
        document.body.removeAttribute(`data-surface-${surface}`);
      }
    });

    // Theme toggle
    const themeToggle = document.querySelector('[data-theme-toggle]');
    themeToggle.addEventListener('change', (e) => {
      if (e.target.checked) {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    });
    // Sync initial state (light theme is off by default)
    if (!themeToggle.checked) {
      document.documentElement.removeAttribute('data-theme');
    }
  }

  // Initialize
  buildOverlay();
  initToggles();
</script>
</body>
</html>
