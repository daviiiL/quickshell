<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wi-Fi Overlay — Preview</title>
<style>
  :root {
    --bar-bg: #0a0a0a;
    --panel-bg: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container-high: #2b2930;
    --hair: #272727;
    --hair-hot: #3a3a3a;
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;
    --accent: #e3e3e3;
    --live: #5dc70a;
    --warn: #ffd4ab;
    --bar-h: 48px;
    --pop-w: 300px;
    --hair-w: 1px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 20% 30%, #1a1820 0%, transparent 60%),
      radial-gradient(900px 500px at 80% 80%, #121016 0%, transparent 60%),
      #07070a;
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, sans-serif;
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Fake main bar */
  .fake-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: var(--bar-h);
    background: var(--bar-bg);
    border-top: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
    gap: 14px;
    color: var(--ink-dim);
    z-index: 1;
  }
  .fake-bar::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 220px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  .bar-btn {
    height: 30px;
    padding: 0 9px;
    display: flex; align-items: center; gap: 7px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--ink-dim);
    font-size: 14px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .bar-btn:hover { background: var(--surface-container-low); border-color: var(--hair); color: var(--ink); }
  .bar-btn.active { border-color: var(--hair-hot); color: var(--ink); }
  .bar-btn .glyph { opacity: 0.56; display: grid; place-items: center; }
  .bar-btn:hover .glyph, .bar-btn.active .glyph { opacity: 1; }

  /* The overlay popup */
  .pop {
    position: fixed;
    right: 14px;
    bottom: calc(var(--bar-h) + 8px);
    width: var(--pop-w);
    background: var(--panel-bg);
    border: 1px solid var(--hair);
    border-radius: 4px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: calc(100vh - var(--bar-h) - 24px);
  }
  .pop::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 120px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  /* Little pointer tail (so it feels anchored to the bar button) */
  .pop::after {
    content: "";
    position: absolute;
    bottom: -5px;
    right: 22px;
    width: 10px; height: 10px;
    background: var(--panel-bg);
    border-right: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    transform: rotate(45deg);
  }

  /* Head */
  .p-head {
    padding: 14px 16px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--hair);
  }
  .p-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .p-title .state {
    margin-left: 6px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  /* Toggle pill switch */
  .switch {
    width: 30px; height: 16px; border-radius: 999px;
    border: 1px solid var(--hair);
    background: transparent;
    position: relative;
    cursor: pointer;
    transition: background 180ms ease, border-color 180ms ease;
  }
  .switch .knob {
    position: absolute;
    top: 1px; left: 1px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ink-dimmer);
    transition: left 180ms cubic-bezier(.2,0,0,1), background 180ms ease;
  }
  .switch.on { background: rgba(227,227,227,0.12); border-color: var(--hair-hot); }
  .switch.on .knob { left: 15px; background: var(--accent); }

  /* Current connection card */
  .current {
    padding: 16px 16px;
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--hair);
    cursor: pointer;
    transition: background 150ms ease;
  }
  .current:hover { background: var(--surface-container-low); }
  .current .icon { color: var(--ink); display: grid; place-items: center; }
  .current .ssid { font-size: 13px; color: var(--ink); font-weight: 500; letter-spacing: 0.02em; }
  .current .meta {
    font-size: 10px; color: var(--ink-dimmer);
    text-transform: uppercase; letter-spacing: 0.14em;
    margin-top: 2px;
    display: flex; gap: 6px; align-items: center;
  }
  .current .meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--live); box-shadow: 0 0 0 2px rgba(93,199,10,0.25); }
  .current .acts {
    display: flex; gap: 6px; align-items: center;
    color: var(--ink-dimmer);
  }
  .current .acts span {
    cursor: pointer;
    padding: 2px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    line-height: 1;
  }
  .current .acts span.more { font-size: 14px; letter-spacing: 0; padding: 0 4px 4px; }
  .current .acts span:hover { color: var(--ink); }

  /* Section label */
  .sec-head {
    padding: 14px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sec-title {
    font-size: 11px;
    color: var(--ink-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .sec-meta { font-size: 12px; color: var(--ink-dim); }
  .sec-meta.scanning { color: var(--ink-dim); }
  .sec-meta.scanning::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: blink 1.2s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.25 } }

  /* Networks list — no scroll; popup grows to fit content */
  .nets {}

  .net {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 22px 1fr 18px 34px;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    transition: background 150ms ease;
    border-top: 1px solid var(--hair);
  }
  .net .sig svg  { width: 15px; height: 15px; }
  .net .lock svg { width: 14px; height: 14px; }
  .net:hover { background: var(--surface-container-low); }
  .net .sig { color: var(--ink); opacity: 0.78; display: grid; place-items: center; }
  .net .name { font-size: 14px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .net .sub { font-size: 11px; color: var(--ink-dimmer); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 2px; }
  .net .lock { color: var(--ink-dimmer); display: grid; place-items: center; }
  .net .pct { font-size: 12px; color: var(--ink-dim); text-align: right; font-variant-numeric: tabular-nums; }
  .net.saved .sub::before { content: "saved · "; color: var(--live); }

  .net.weak .sig { opacity: 0.35; }
  .net.weak .name { color: var(--ink-dim); }

  /* Connecting state (row) */
  .net.connecting .sig { opacity: 1; }
  .net.connecting .sig .bars { display: none; }
  .net.connecting .sig .pulse {
    display: block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.1s infinite;
  }
  .net .sig .pulse { display: none; }
  .net.connecting .sub { color: var(--ink) !important; letter-spacing: 0.14em; }
  .net.connecting .sub::before { content: none !important; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.78); }
  }

  /* Expansion area under an unknown row */
  .net-expand {
    display: none;
    padding: 14px 16px 16px;
    border-top: 1px solid var(--hair);
    background: var(--panel-bg);
  }
  .net-expand.open { display: block; }
  .expand-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 10px;
    align-items: center;
  }
  .expand-row .lbl {
    font-size: 10px;
    color: var(--ink-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .expand-row input[type="password"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--hair);
    color: var(--ink);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 3px 2px 4px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .expand-row input[type="password"]:focus { border-bottom-color: var(--hair-hot); }
  .expand-row input[type="password"]::placeholder { color: var(--ink-faint); letter-spacing: 0.02em; }
  .expand-btn {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    padding: 4px 8px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    cursor: pointer;
    transition: color 150ms, border-color 150ms, background 150ms;
    background: transparent;
    font-family: inherit;
  }
  .expand-btn:not(:disabled):hover { color: var(--ink); border-color: var(--hair-hot); background: var(--surface-container-low); }
  .expand-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .expand-btn.busy { color: var(--ink); border-color: var(--hair-hot); }
  .expand-cancel {
    color: var(--ink-dimmer);
    font-size: 16px;
    width: 18px; height: 18px;
    display: grid; place-items: center;
    cursor: pointer;
    border: none;
    background: transparent;
    border-radius: 2px;
    transition: color 150ms, background 150ms;
  }
  .expand-cancel:hover { color: var(--ink); background: var(--surface-container-low); }
  .expand-err {
    margin-top: 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--warn);
    display: none;
  }
  .expand-err.show { display: block; }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    border-top: 1px solid var(--hair);
    gap: 10px;
  }
  .footer .btn {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    padding: 4px 8px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    cursor: pointer;
    transition: color 150ms, border-color 150ms, background 150ms;
  }
  .footer .btn:hover { color: var(--ink); border-color: var(--hair-hot); background: var(--surface-container-low); }

  /* SVG defaults */
  svg { display: block; }
</style>
</head>

<script>
  document.getElementById('wifiSwitch').addEventListener('click', (e) => {
    e.currentTarget.classList.toggle('on');
  });

  // ── Password expansion + connecting states ───────────────────────────
  const DEMO_PASSWORD = 'correcthorse';

  function buildExpand(expand) {
    while (expand.firstChild) expand.removeChild(expand.firstChild);
    const row = document.createElement('div');
    row.className = 'expand-row';

    const lbl = document.createElement('div');
    lbl.className = 'lbl';
    lbl.textContent = 'password';

    const input = document.createElement('input');
    input.type = 'password';
    input.placeholder = 'enter password';
    input.autocomplete = 'off';

    const btn = document.createElement('button');
    btn.className = 'expand-btn';
    btn.textContent = 'Connect';
    btn.disabled = true;

    const cancel = document.createElement('button');
    cancel.className = 'expand-cancel';
    cancel.title = 'cancel';
    cancel.textContent = '×';

    row.append(lbl, input, btn, cancel);

    const err = document.createElement('div');
    err.className = 'expand-err';
    err.textContent = "couldn't connect — check password";

    expand.append(row, err);
    return { input, btn, cancel, err };
  }

  function clearExpand(expand) {
    while (expand.firstChild) expand.removeChild(expand.firstChild);
  }

  function collapseAll() {
    document.querySelectorAll('.net-expand.open').forEach(ex => {
      ex.classList.remove('open');
      clearExpand(ex);
    });
  }

  function setConnecting(row, on) {
    const sub = row.querySelector('.sub');
    if (on) {
      if (!row.dataset.subOriginal) row.dataset.subOriginal = sub.textContent;
      sub.textContent = 'connecting…';
      row.classList.add('connecting');
    } else {
      if (row.dataset.subOriginal) sub.textContent = row.dataset.subOriginal;
      row.classList.remove('connecting');
    }
  }

  function expandUnknown(row) {
    const expand = row.nextElementSibling;
    if (!expand || !expand.classList.contains('net-expand')) return;
    collapseAll();
    expand.classList.add('open');
    const { input, btn, cancel, err } = buildExpand(expand);

    const update = () => { btn.disabled = input.value.length < 8; };
    input.addEventListener('input', () => {
      err.classList.remove('show');
      update();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { cancel.click(); }
      else if (e.key === 'Enter' && !btn.disabled) { btn.click(); }
    });
    cancel.addEventListener('click', (e) => {
      e.stopPropagation();
      expand.classList.remove('open');
      clearExpand(expand);
    });
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      btn.classList.add('busy');
      btn.textContent = 'connecting…';
      btn.disabled = true;
      input.disabled = true;
      setConnecting(row, true);

      setTimeout(() => {
        if (input.value === DEMO_PASSWORD || row.dataset.attempted === '1') {
          setConnecting(row, false);
          expand.classList.remove('open');
          clearExpand(expand);
          row.dataset.attempted = '';
        } else {
          setConnecting(row, false);
          row.dataset.attempted = '1';
          btn.classList.remove('busy');
          btn.textContent = 'Connect';
          input.disabled = false;
          input.value = '';
          update();
          err.classList.add('show');
          input.focus();
        }
      }, 900);
    });

    input.focus();
  }

  function connectKnown(row) {
    collapseAll();
    setConnecting(row, true);
    setTimeout(() => { setConnecting(row, false); }, 1200);
  }

  document.querySelectorAll('.net').forEach(row => {
    row.addEventListener('click', (e) => {
      if (row.classList.contains('connecting')) return;
      if (row.dataset.known === '1' || row.dataset.open === '1') {
        connectKnown(row);
      } else {
        const expand = row.nextElementSibling;
        if (expand && expand.classList.contains('open')) {
          collapseAll();
        } else {
          expandUnknown(row);
        }
      }
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') collapseAll();
  });

  // ── Offline-state demo for the bar button (?offline=1) ───────────────
  if (new URLSearchParams(location.search).get('offline') === '1') {
    const btn = document.getElementById('wifiBtn');
    if (btn) {
      btn.classList.remove('active');
      const last = btn.childNodes[btn.childNodes.length - 1];
      if (last && last.nodeType === Node.TEXT_NODE) {
        last.textContent = ' offline';
      }
    }
  }

  // Auto-reload support (?reload=1)
  if (new URLSearchParams(location.search).get('reload') === '1') {
    let last = null;
    setInterval(async () => {
      try {
        const r = await fetch(location.pathname, { method: 'HEAD', cache: 'no-store' });
        const m = r.headers.get('last-modified');
        if (last && m && m !== last) location.reload();
        last = last || m;
      } catch (e) {}
    }, 1000);
  }
</script>
</body>
</html>
