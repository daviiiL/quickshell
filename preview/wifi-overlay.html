<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Wi-Fi Overlay — Preview</title>
<style>
  :root {
    --bar-bg: #0a0a0a;
    --panel-bg: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container-high: #2b2930;
    --hair: #272727;
    --hair-hot: #3a3a3a;
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;
    --accent: #e3e3e3;
    --live: #5dc70a;
    --warn: #ffd4ab;
    --bar-h: 48px;
    --pop-w: 300px;
    --hair-w: 1px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 20% 30%, #1a1820 0%, transparent 60%),
      radial-gradient(900px 500px at 80% 80%, #121016 0%, transparent 60%),
      #07070a;
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, sans-serif;
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Fake main bar */
  .fake-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: var(--bar-h);
    background: var(--bar-bg);
    border-top: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
    gap: 14px;
    color: var(--ink-dim);
    z-index: 1;
  }
  .fake-bar::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 220px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  .bar-btn {
    height: 30px;
    padding: 0 9px;
    display: flex; align-items: center; gap: 7px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--ink-dim);
    font-size: 14px;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
  }
  .bar-btn:hover { background: var(--surface-container-low); border-color: var(--hair); color: var(--ink); }
  .bar-btn.active { border-color: var(--hair-hot); color: var(--ink); }
  .bar-btn .glyph { opacity: 0.56; display: grid; place-items: center; }
  .bar-btn:hover .glyph, .bar-btn.active .glyph { opacity: 1; }

  /* The overlay popup */
  .pop {
    position: fixed;
    right: 14px;
    bottom: calc(var(--bar-h) + 8px);
    width: var(--pop-w);
    background: var(--panel-bg);
    border: 1px solid var(--hair);
    border-radius: 4px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: calc(100vh - var(--bar-h) - 24px);
  }
  .pop::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 120px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  /* Little pointer tail (so it feels anchored to the bar button) */
  .pop::after {
    content: "";
    position: absolute;
    bottom: -5px;
    right: 22px;
    width: 10px; height: 10px;
    background: var(--panel-bg);
    border-right: 1px solid var(--hair);
    border-bottom: 1px solid var(--hair);
    transform: rotate(45deg);
  }

  /* Head */
  .p-head {
    padding: 10px 12px 8px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--hair);
  }
  .p-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .p-title .state {
    margin-left: 6px;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
  }
  /* Toggle pill switch */
  .switch {
    width: 30px; height: 16px; border-radius: 999px;
    border: 1px solid var(--hair);
    background: transparent;
    position: relative;
    cursor: pointer;
    transition: background 180ms ease, border-color 180ms ease;
  }
  .switch .knob {
    position: absolute;
    top: 1px; left: 1px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--ink-dimmer);
    transition: left 180ms cubic-bezier(.2,0,0,1), background 180ms ease;
  }
  .switch.on { background: rgba(227,227,227,0.12); border-color: var(--hair-hot); }
  .switch.on .knob { left: 15px; background: var(--accent); }

  /* Current connection card */
  .current {
    padding: 12px 12px;
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--hair);
    cursor: pointer;
    transition: background 150ms ease;
  }
  .current:hover { background: var(--surface-container-low); }
  .current .icon { color: var(--ink); display: grid; place-items: center; }
  .current .ssid { font-size: 13px; color: var(--ink); font-weight: 500; letter-spacing: 0.02em; }
  .current .meta {
    font-size: 10px; color: var(--ink-dimmer);
    text-transform: uppercase; letter-spacing: 0.14em;
    margin-top: 2px;
    display: flex; gap: 6px; align-items: center;
  }
  .current .meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--live); box-shadow: 0 0 0 2px rgba(93,199,10,0.25); }
  .current .acts {
    display: flex; gap: 6px;
    color: var(--ink-dimmer);
  }
  .current .acts span { cursor: pointer; padding: 2px 4px; }
  .current .acts span:hover { color: var(--ink); }

  /* Section label */
  .sec-head {
    padding: 10px 12px 6px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sec-title {
    font-size: 10px;
    color: var(--ink-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .sec-meta { font-size: 11px; color: var(--ink-dim); }
  .sec-meta.scanning { color: var(--ink-dim); }
  .sec-meta.scanning::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: blink 1.2s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: 0.25 } }

  /* Networks list */
  .nets {
    overflow-y: auto;
    max-height: 280px;
  }
  .nets::-webkit-scrollbar { width: 6px; }
  .nets::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 3px; }
  .nets::-webkit-scrollbar-track { background: transparent; }

  .net {
    padding: 9px 12px;
    display: grid;
    grid-template-columns: 22px 1fr 14px 34px;
    gap: 10px;
    align-items: center;
    cursor: pointer;
    transition: background 150ms ease;
    border-top: 1px solid var(--hair);
  }
  .net:hover { background: var(--surface-container-low); }
  .net .sig { color: var(--ink); opacity: 0.78; display: grid; place-items: center; }
  .net .name { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .net .sub { font-size: 10px; color: var(--ink-dimmer); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 2px; }
  .net .lock { color: var(--ink-dimmer); display: grid; place-items: center; }
  .net .pct { font-size: 11px; color: var(--ink-dim); text-align: right; font-variant-numeric: tabular-nums; }
  .net.saved .sub::before { content: "saved · "; color: var(--live); }

  .net.weak .sig { opacity: 0.35; }
  .net.weak .name { color: var(--ink-dim); }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-top: 1px solid var(--hair);
    gap: 10px;
  }
  .footer .btn {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    padding: 4px 8px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    cursor: pointer;
    transition: color 150ms, border-color 150ms, background 150ms;
  }
  .footer .btn:hover { color: var(--ink); border-color: var(--hair-hot); background: var(--surface-container-low); }

  /* SVG defaults */
  svg { display: block; }
</style>
</head>

<script>
  document.getElementById('wifiSwitch').addEventListener('click', (e) => {
    e.currentTarget.classList.toggle('on');
  });
  // Auto-reload support (?reload=1)
  if (new URLSearchParams(location.search).get('reload') === '1') {
    let last = null;
    setInterval(async () => {
      try {
        const r = await fetch(location.pathname, { method: 'HEAD', cache: 'no-store' });
        const m = r.headers.get('last-modified');
        if (last && m && m !== last) location.reload();
        last = last || m;
      } catch (e) {}
    }, 1000);
  }
</script>
