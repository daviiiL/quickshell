<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lang Switcher — fcitx5 Preview</title>
<style>
  :root {
    /* surfaces */
    --bar-bg: #0a0a0a;
    --panel-bg: #141218;
    --surface-container-lowest: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container: #211f26;
    --surface-container-high: #2b2930;

    /* text */
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;

    /* lines */
    --hair: #272727;
    --hair-hot: #3a3a3a;

    /* accents / status */
    --accent: #e3e3e3;
    --bar-accent: #e3e3e3;
    --live: #5dc70a;
    --warn: #ffd4ab;
    --err: #f2b8b5;

    /* desktop backdrop */
    --desktop-base: #07070a;
    --desktop-warm: #1a1820;
    --desktop-cool: #121016;

    /* geometry */
    --bar-h: 48px;
    --radius-sm: 3px;
    --radius-md: 4px;
    --hair-w: 1px;
    --strip-h: 40px;

    /* streak — shared accent gradient motif */
    --streak: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
    --osd-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
  }

  :root[data-theme="light"] {
    --bar-bg: #e4e0e9;
    --panel-bg: #f5f2f7;
    --surface-container-lowest: #fbf9fc;
    --surface-container-low: #eee9f0;
    --surface-container: #e3dee6;
    --surface-container-high: #d4cfd9;

    --ink: #1c1820;
    --ink-dim: #5b5764;
    --ink-dimmer: #827e8a;
    --ink-faint: #a8a4b0;

    --hair: #d6d1dc;
    --hair-hot: #bcb7c2;

    --accent: #1c1820;
    --bar-accent: #1c1820;
    --live: #3d8f0a;
    --warn: #a65a1c;
    --err: #b3261e;

    --desktop-base: #dcd7e0;
    --desktop-warm: #ebe6ee;
    --desktop-cool: #d4d7dc;

    --streak: linear-gradient(90deg, rgba(28,24,32,0.45), transparent);
    --osd-shadow: 0 12px 32px rgba(28, 24, 32, 0.18);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 20% 30%, var(--desktop-warm) 0%, transparent 60%),
      radial-gradient(900px 500px at 80% 80%, var(--desktop-cool) 0%, transparent 60%),
      var(--desktop-base);
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .cjk { font-family: "Noto Sans CJK SC", "Noto Sans CJK HK", "Source Han Sans SC", sans-serif; }
  .kai { font-family: "LXGW WenKai", "Noto Sans CJK SC", sans-serif; }

  .canvas {
    position: relative;
    margin-top: var(--strip-h);
    height: calc(100vh - var(--strip-h));
    overflow: hidden;
  }

  /* === preview chrome strip === */
  .strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--strip-h);
    background: var(--bar-bg);
    border-bottom: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 1000;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .strip h1 {
    margin: 0;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-dimmer);
    letter-spacing: 0.18em;
  }
  .strip .pills { display: flex; gap: 6px; align-items: center; }
  .toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    height: 24px;
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-sm);
    color: var(--ink-dimmer);
    cursor: pointer;
    user-select: none;
    background: transparent;
  }
  .toggle input { display: none; }
  .toggle:has(input:checked) {
    background: var(--surface-container-low);
    color: var(--ink);
    border-color: var(--hair-hot);
  }
  .toggle:has(input:checked)::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
  }
  .strip .sep {
    width: var(--hair-w);
    align-self: stretch;
    background: var(--hair);
    margin: 0 4px;
  }
  .sim {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px;
    height: 24px;
    border: var(--hair-w) solid var(--hair-hot);
    border-radius: var(--radius-sm);
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    background: var(--surface-container-low);
  }
  .sim .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 16px;
    height: 16px;
    padding: 0 4px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
  }

  /* === Bar (faithful replica: subgroups + hairline separators) === */
  .bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: var(--bar-h);
    background: var(--bar-bg);
    border-top: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: stretch;
    z-index: 50;
  }
  .bar::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: var(--hair-w);
    width: 220px;
    background: var(--streak);
  }
  .bar .group { display: flex; align-items: stretch; }
  .bar .sub {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
  }
  .bar .vsep { width: var(--hair-w); background: var(--hair); }
  .bar .motto {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-dimmer);
    letter-spacing: 0.18em;
  }
  .bar .right { margin-left: auto; }

  .bar-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    height: calc(var(--bar-h) - 12px);
    align-self: center;
    border: var(--hair-w) solid transparent;
    border-radius: var(--radius-sm);
    color: var(--ink-dim);
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: default;
    background: transparent;
  }
  .bar-btn:hover { background: var(--surface-container-low); border-color: var(--hair); color: var(--ink); }
  .bar-btn .glyph { opacity: 0.56; display: grid; place-items: center; }
  .bar-btn:hover .glyph { opacity: 1; }

  /* clock cell */
  .dot-live {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 2px rgba(93,199,10,0.25);
  }
  .clock { font-size: 12px; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }

  /* workspaces */
  .ws { display: flex; align-items: center; }
  .ws span {
    position: relative;
    display: grid; place-items: center;
    width: 26px;
    height: calc(var(--bar-h) - 12px);
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .ws span.on {
    color: var(--ink);
    background: var(--surface-container-low);
    border-radius: var(--radius-sm);
  }
  .ws span.on::before {
    content: "";
    position: absolute;
    left: 6px; right: 6px; top: 0;
    height: 1px;
    background: var(--accent);
    opacity: 0.7;
  }
  .ws span.busy::after {
    content: "";
    position: absolute;
    bottom: 4px; left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--ink-dimmer);
  }

  /* dock */
  .dock-item {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: var(--radius-sm);
    border: 1px solid var(--hair);
    background: var(--surface-container-lowest);
    color: var(--ink-dim);
  }
  .dock-item:hover { color: var(--ink); border-color: var(--hair-hot); }

  /* ============================================================
     LANG INDICATOR — bare code (EN / 拼) + transient inline label.
     On switch the cell widens to reveal the language name for a
     moment, streak lit on its top edge, then collapses back.
     ============================================================ */
  .ind {
    position: relative;
    overflow: hidden;
    gap: 0; /* label carries its own lead-in padding; zero-width label must not offset the code */
  }
  .ind .im-code { display: none; }
  body[data-im="en"] .ind .im-code.en { display: inline; }
  body[data-im="py"] .ind .im-code.py { display: inline; }
  .ind .im-code.en { font-size: 11px; letter-spacing: 0.06em; }
  .ind .im-code.py { font-size: 13px; letter-spacing: 0; }
  body[data-expanded="on"] .ind .im-code { color: var(--ink); }

  /* transient label — a grid track animating 0fr → 1fr.
     Collapsed width is zero by construction: no reserved gap,
     no max-width magic number, no flex minimum-size quirks. */
  .ind .im-label {
    display: grid;
    grid-template-columns: 0fr;
    opacity: 0;
    transition:
      grid-template-columns 280ms cubic-bezier(.2,0,0,1),
      opacity 200ms ease;
  }
  body[data-expanded="on"] .ind .im-label {
    grid-template-columns: 1fr;
    opacity: 1;
  }
  .ind .im-label .l-clip {
    min-width: 0;
    overflow: hidden;
    white-space: nowrap;
    display: flex;
    align-items: center;
  }
  .ind .im-label .l-en, .ind .im-label .l-py { display: none; }
  body[data-im="en"] .ind .im-label .l-en { display: inline-flex; }
  body[data-im="py"] .ind .im-label .l-py { display: inline-flex; }
  .ind .im-label .name {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-dimmer);
    padding-left: 8px;
  }
  .ind .im-label .han {
    font-size: 11px;
    color: var(--ink-dim);
    padding-left: 8px;
  }
  .ind .im-label .han + .name { padding-left: 6px; }

  /* streak on the cell's top edge while expanded */
  .ind::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px;
    width: 100%;
    background: var(--streak);
    opacity: 0;
    transition: opacity 200ms ease;
  }
  body[data-expanded="on"] .ind::before { opacity: 1; }
  body[data-expanded="on"] .ind {
    background: var(--surface-container-low);
    border-color: var(--hair);
  }

  /* ============================================================
     SWITCH OSD — the bar cell at display scale. Same anatomy
     (code tile + own-script name + group index), same timer as
     the bar label. The streak draws itself across the top edge
     on every switch.
     ============================================================ */
  .osd {
    position: absolute;
    top: 24px;
    left: 50%;
    z-index: 95;
    display: grid;
    height: 56px;   /* fixed — never resizes between languages */
    width: 220px;   /* fixed — faces crossfade inside a frozen frame */
    padding: 0 16px;
    background: var(--panel-bg);
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-md);
    box-shadow: var(--osd-shadow);
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -6px);
    transition: opacity 200ms ease, transform 240ms cubic-bezier(.2,0,0,1);
  }
  body[data-expanded="on"] .osd {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* streak sweep — retriggered per switch via .anim */
  .osd::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px;
    width: 140px;
    background: var(--streak);
    opacity: 0;
  }
  body[data-expanded="on"] .osd::before { opacity: 1; }
  .osd.anim::before {
    animation: sweep 420ms cubic-bezier(.2,0,0,1) 60ms forwards;
  }
  @keyframes sweep {
    from { width: 0; opacity: 0.4; }
    to   { width: 140px; opacity: 1; }
  }

  /* two faces stacked in the same grid cell, crossfading */
  .osd .face {
    grid-area: 1 / 1;
    display: grid;
    grid-template-columns: 34px 1fr auto;
    align-items: center;
    gap: 14px;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 200ms ease, transform 240ms cubic-bezier(.2,0,0,1);
  }
  body[data-im="en"] .osd .face.en,
  body[data-im="py"] .osd .face.py {
    opacity: 1;
    transform: translateY(0);
  }

  .osd .tile {
    display: grid; place-items: center;
    width: 34px; height: 34px;
    border: 1px solid var(--hair);
    border-radius: var(--radius-sm);
    background: var(--surface-container-lowest);
    color: var(--ink);
  }
  .osd .face.en .tile { font-size: 11px; letter-spacing: 0.1em; font-weight: 500; }
  .osd .face.py .tile { font-size: 19px; }

  .osd .name { color: var(--ink); white-space: nowrap; }
  .osd .face.en .name {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .osd .face.py .name {
    font-size: 15px;
    letter-spacing: 0.12em;
  }
  .osd.anim .face .name { animation: trackIn 420ms cubic-bezier(.2,0,0,1); }
  @keyframes trackIn {
    from { letter-spacing: 0.04em; opacity: 0.3; }
  }

  .osd .idx {
    font-size: 11px;
    color: var(--ink-dimmer);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.06em;
  }

  /* SVG baseline */
  svg { display: block; }
  .glyph svg path, .glyph svg line, .glyph svg circle, .glyph svg rect, .glyph svg polyline {
    stroke: currentColor;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>

  <script>
    const body = document.body;
    let hideTimer = null;

    function holdOn() {
      return document.querySelector('[data-hold]').checked;
    }

    function expand() {
      body.dataset.expanded = 'on';
      clearTimeout(hideTimer);
      if (!holdOn()) {
        hideTimer = setTimeout(() => { body.dataset.expanded = ''; }, 1400);
      }
    }

    function switchIM() {
      body.dataset.im = body.dataset.im === 'en' ? 'py' : 'en';
      expand();
      // retrigger the streak sweep + tracking-in
      const osd = document.getElementById('osd');
      osd.classList.remove('anim');
      void osd.offsetWidth;
      osd.classList.add('anim');
    }

    // triggers: sim button, S key, Ctrl+Space (may be eaten by a real IM)
    document.getElementById('simBtn').addEventListener('click', switchIM);
    document.addEventListener('keydown', e => {
      if (e.key === 's' || e.key === 'S' || (e.ctrlKey && e.code === 'Space')) {
        e.preventDefault();
        switchIM();
      }
    });

    // hold: keep the label expanded for inspection
    document.querySelector('[data-hold]').addEventListener('change', e => {
      if (e.target.checked) expand();
      else { clearTimeout(hideTimer); body.dataset.expanded = ''; }
    });

    // theme
    document.querySelector('[data-theme-toggle]').addEventListener('change', e => {
      document.documentElement.dataset.theme = e.target.checked ? 'light' : '';
    });

    // query params for deterministic screenshots: ?im=py&hold=1&theme=light
    const q = new URLSearchParams(location.search);
    if (q.get('im')) body.dataset.im = q.get('im');
    if (q.get('theme') === 'light') {
      document.documentElement.dataset.theme = 'light';
      document.querySelector('[data-theme-toggle]').checked = true;
    }
    if (q.get('hold')) {
      document.querySelector('[data-hold]').checked = true;
      body.dataset.expanded = 'on';
    }
    if (q.get('lit')) { // force the hover chrome to eyeball centering
      const ind = document.querySelector('.ind');
      ind.style.background = 'var(--surface-container-low)';
      ind.style.borderColor = 'var(--hair)';
    }
    if (q.get('debug')) { // print code-glyph padding measurements into the motto slot
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const ind = document.querySelector('.ind');
        const code = ind.querySelector(body.dataset.im === 'en' ? '.im-code.en' : '.im-code.py');
        const label = ind.querySelector('.im-label');
        const ir = ind.getBoundingClientRect(), cr = code.getBoundingClientRect(), lr = label.getBoundingClientRect();
        document.querySelector('.motto').textContent =
          `L=${(cr.left - ir.left).toFixed(1)}  R=${(ir.right - cr.right).toFixed(1)}  labelW=${lr.width.toFixed(1)}  indW=${ir.width.toFixed(1)}`;
      }));
    }
  </script>
</body>
</html>
