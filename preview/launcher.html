<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Launcher — Preview</title>
<style>
  :root {
    --bar-bg: #0a0a0a;
    --panel-bg: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container-high: #2b2930;
    --hair: #272727;
    --hair-hot: #3a3a3a;
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;
    --accent: #e3e3e3;
    --live: #5dc70a;
    --warn: #ffd4ab;
    --bar-h: 48px;
    --launcher-w: 560px;
    --hair-w: 1px;
    --radius-sm: 3px;
    --radius-md: 4px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 20% 30%, #1a1820 0%, transparent 60%),
      radial-gradient(900px 500px at 80% 80%, #121016 0%, transparent 60%),
      #07070a;
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, sans-serif;
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Fake main bar (anchoring context only) */
  .fake-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: var(--bar-h);
    background: var(--bar-bg);
    border-top: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
    gap: 14px;
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.04em;
    z-index: 1;
  }
  .fake-bar::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 220px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  .bar-btn {
    height: 30px;
    padding: 0 9px;
    display: flex; align-items: center; gap: 7px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--ink-dim);
    font-size: 13px;
    letter-spacing: 0.02em;
  }

  /* Scrim — darkens the world slightly when launcher is open */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: 2;
  }

  /* Launcher itself — centered, slightly above center */
  .launcher {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: var(--launcher-w);
    background: var(--panel-bg);
    border: 1px solid var(--hair);
    border-radius: var(--radius-md);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.6),
      0 2px 0 rgba(255,255,255,0.02) inset;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 3;
  }
  .launcher::before {
    content: "";
    position: absolute;
    left: 0; top: 0;
    height: 1px; width: 180px;
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
    pointer-events: none;
  }

  /* Input row */
  .query {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 18px 18px 18px 18px;
  }
  .query.has-results {
    border-bottom: 1px solid var(--hair);
  }
  .query .icon {
    color: var(--ink-dim);
    display: grid; place-items: center;
  }
  .query input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 20px;
    letter-spacing: 0.01em;
    padding: 2px 0;
    caret-color: var(--accent);
  }
  .query input::placeholder {
    color: var(--ink-faint);
    font-weight: 400;
  }

  .query .hint {
    display: flex; align-items: center; gap: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .query .hint .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    background: transparent;
  }

  /* Empty state — just a thin bottom strip with keyboard hints */
  .empty-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    border-top: 1px solid var(--hair);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .empty-foot .group { display: flex; gap: 14px; align-items: center; }
  .empty-foot .pair { display: flex; gap: 6px; align-items: center; }

  /* Results list */
  .results {
    display: none;
    flex-direction: column;
    max-height: 52vh;
    overflow-y: auto;
  }
  .results.show { display: flex; }

  .results::-webkit-scrollbar { width: 6px; }
  .results::-webkit-scrollbar-track { background: transparent; }
  .results::-webkit-scrollbar-thumb { background: var(--hair); border-radius: 3px; }
  .results::-webkit-scrollbar-thumb:hover { background: var(--hair-hot); }

  .row {
    display: grid;
    grid-template-columns: 28px 1fr auto 20px;
    gap: 14px;
    align-items: center;
    padding: 12px 18px;
    cursor: pointer;
    border-top: 1px solid transparent;
    border-bottom: 1px solid transparent;
    transition: background 120ms ease;
    position: relative;
  }
  .row + .row { border-top-color: var(--hair); }
  .row:hover { background: var(--surface-container-low); }
  .row.selected { background: var(--surface-container-low); }
  .row.selected::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 2px;
    height: 100%;
    background: var(--accent);
  }

  .row .app-icon {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    border-radius: 4px;
    background: var(--surface-container-low);
    border: 1px solid var(--hair);
    color: var(--ink);
  }
  .row.selected .app-icon {
    border-color: var(--hair-hot);
    background: var(--surface-container-high);
  }
  .row .app-icon svg { width: 15px; height: 15px; opacity: 0.9; }

  .row .meta { display: flex; flex-direction: column; min-width: 0; }
  .row .name {
    font-size: 14px;
    color: var(--ink);
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row .name .match {
    color: var(--ink);
    background: rgba(227,227,227,0.10);
    border-radius: 2px;
    padding: 0 1px;
  }
  .row .desc {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-dimmer);
    margin-top: 3px;
  }
  .row .shortcut {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--ink-dimmer);
    text-transform: uppercase;
  }
  .row .enter {
    display: grid; place-items: center;
    color: var(--ink-faint);
    opacity: 0;
    transition: opacity 120ms ease, color 120ms ease;
  }
  .row.selected .enter { opacity: 1; color: var(--ink-dim); }

  /* Results footer — shows count + keys */
  .results-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    border-top: 1px solid var(--hair);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dimmer);
  }
  .results-foot .group { display: flex; gap: 14px; align-items: center; }
  .results-foot .pair { display: flex; gap: 6px; align-items: center; }
  .results-foot .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    border: 1px solid var(--hair);
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-dim);
    background: transparent;
  }

  /* No-match */
  .no-match {
    display: none;
    padding: 30px 18px;
    text-align: center;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-dimmer);
    border-top: 1px solid var(--hair);
  }
  .no-match.show { display: block; }
  .no-match .q { color: var(--ink-dim); }

  svg { display: block; }
</style>
</head>
<body>

  <div class="scrim"></div>

  <div class="launcher" role="dialog" aria-label="Launcher">

    <div class="query" id="query">
      <div class="icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <path d="m20 20-3.5-3.5"/>
        </svg>
      </div>
      <input id="q" type="text" autocomplete="off" spellcheck="false" placeholder="search applications…" autofocus />
      <div class="hint">
        <span class="pair"><span class="kbd">esc</span><span>close</span></span>
      </div>
    </div>

    <div class="results" id="results"></div>

    <div class="no-match" id="noMatch">
      no results for <span class="q" id="noMatchQ"></span>
    </div>

    <div class="empty-foot" id="emptyFoot">
      <div class="group">
        <span class="pair"><span>type to search</span></span>
      </div>
      <div class="group">
        <span class="pair"><span>↵</span><span>launch</span></span>
        <span class="pair"><span>esc</span><span>close</span></span>
      </div>
    </div>

    <div class="results-foot" id="resultsFoot" style="display:none">
      <div class="group">
        <span class="pair"><span id="resultsCount">0 matches</span></span>
      </div>
      <div class="group">
        <span class="pair"><span class="kbd">↑</span><span class="kbd">↓</span><span>navigate</span></span>
        <span class="pair"><span class="kbd">↵</span><span>launch</span></span>
        <span class="pair"><span class="kbd">esc</span><span>close</span></span>
      </div>
    </div>

  </div>

  <!-- Fake main bar (context) -->
  <div class="fake-bar">
    <div class="bar-btn">72%</div>
    <div class="bar-btn">42%</div>
    <div class="bar-btn">atlas-5G</div>
  </div>

<script>
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // Build an inline icon from a compact descriptor ({paths, opacityPaths?, circles?})
  // Keeps line-icon consistency and avoids innerHTML entirely.
  function makeIcon(spec) {
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.6');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    for (const p of spec) {
      const el = document.createElementNS(SVG_NS, p.tag);
      for (const [k, v] of Object.entries(p.attrs)) el.setAttribute(k, v);
      svg.appendChild(el);
    }
    return svg;
  }

  // Icon descriptors — compact, readable, no HTML strings
  const I = {
    firefox: [
      { tag: 'circle', attrs: { cx: 12, cy: 12, r: 9 } },
      { tag: 'path', attrs: { d: 'M3 12a9 9 0 0 0 18 0' } },
      { tag: 'path', attrs: { d: 'M12 3a9 9 0 0 0 0 18' } },
    ],
    files: [
      { tag: 'path', attrs: { d: 'M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z' } },
    ],
    terminal: [
      { tag: 'rect', attrs: { x: 3, y: 5, width: 18, height: 14, rx: 2 } },
      { tag: 'path', attrs: { d: 'm7 10 3 2-3 2' } },
      { tag: 'path', attrs: { d: 'M13 15h4' } },
    ],
    vscode: [
      { tag: 'path', attrs: { d: 'm16 3 4 2v14l-4 2-9-7 3-2-3-2 9-7z' } },
      { tag: 'path', attrs: { d: 'm16 3-9 7 3 2-3 2 9 7' } },
    ],
    slack: [
      { tag: 'rect', attrs: { x: 3, y: 10, width: 8, height: 4, rx: 2 } },
      { tag: 'rect', attrs: { x: 13, y: 10, width: 8, height: 4, rx: 2 } },
      { tag: 'rect', attrs: { x: 10, y: 3, width: 4, height: 8, rx: 2 } },
      { tag: 'rect', attrs: { x: 10, y: 13, width: 4, height: 8, rx: 2 } },
    ],
    spotify: [
      { tag: 'circle', attrs: { cx: 12, cy: 12, r: 9 } },
      { tag: 'path', attrs: { d: 'M7 9c3-1 8-1 11 1' } },
      { tag: 'path', attrs: { d: 'M7.5 12.5c2.5-.8 6.5-.8 9 .7' } },
      { tag: 'path', attrs: { d: 'M8 16c2-.5 5-.5 7 .5' } },
    ],
    settings: [
      { tag: 'circle', attrs: { cx: 12, cy: 12, r: 3 } },
      { tag: 'path', attrs: { d: 'M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z' } },
    ],
    calc: [
      { tag: 'rect', attrs: { x: 4, y: 3, width: 16, height: 18, rx: 2 } },
      { tag: 'path', attrs: { d: 'M8 7h8' } },
      { tag: 'path', attrs: { d: 'M8 12h2M12 12h2M16 12h0' } },
      { tag: 'path', attrs: { d: 'M8 16h2M12 16h2M16 16v2' } },
    ],
    calendar: [
      { tag: 'rect', attrs: { x: 3, y: 5, width: 18, height: 16, rx: 2 } },
      { tag: 'path', attrs: { d: 'M8 3v4M16 3v4M3 10h18' } },
    ],
    mail: [
      { tag: 'rect', attrs: { x: 3, y: 5, width: 18, height: 14, rx: 2 } },
      { tag: 'path', attrs: { d: 'm3 7 9 7 9-7' } },
    ],
    discord: [
      { tag: 'path', attrs: { d: 'M7 8c3-2 7-2 10 0' } },
      { tag: 'path', attrs: { d: 'M6 18c0 0 2 2 6 2s6-2 6-2' } },
      { tag: 'path', attrs: { d: 'M4 16c1-4 2-7 3-9l4-1' } },
      { tag: 'path', attrs: { d: 'M20 16c-1-4-2-7-3-9l-4-1' } },
      { tag: 'circle', attrs: { cx: 9.5, cy: 13, r: 1.2 } },
      { tag: 'circle', attrs: { cx: 14.5, cy: 13, r: 1.2 } },
    ],
    obsidian: [
      { tag: 'path', attrs: { d: 'm12 3 7 4v10l-7 4-7-4V7z' } },
      { tag: 'path', attrs: { d: 'm12 3 7 4-7 4-7-4z', opacity: 0.4 } },
    ],
    gimp: [
      { tag: 'rect', attrs: { x: 3, y: 3, width: 18, height: 18, rx: 2 } },
      { tag: 'circle', attrs: { cx: 8, cy: 9, r: 1.5 } },
      { tag: 'path', attrs: { d: 'm21 16-5-5-9 9' } },
    ],
    blender: [
      { tag: 'circle', attrs: { cx: 14, cy: 13, r: 5 } },
      { tag: 'path', attrs: { d: 'M4 16 14 8' } },
      { tag: 'circle', attrs: { cx: 14, cy: 13, r: 2 } },
    ],
    steam: [
      { tag: 'circle', attrs: { cx: 12, cy: 12, r: 9 } },
      { tag: 'circle', attrs: { cx: 15, cy: 10, r: 2.5 } },
      { tag: 'path', attrs: { d: 'M3 13 9 16' } },
      { tag: 'circle', attrs: { cx: 9, cy: 16, r: 1.6 } },
    ],
    enter: [
      { tag: 'path', attrs: { d: 'M20 6v6a3 3 0 0 1-3 3H5' } },
      { tag: 'path', attrs: { d: 'm9 11-4 4 4 4' } },
    ],
  };

  // ── App catalogue (mock) ─────────────────────────────────────────────
  const APPS = [
    { name: 'Firefox',    desc: 'Web Browser',          keywords: ['web','browser','internet','mozilla'], shortcut: '⌘ B', icon: I.firefox },
    { name: 'Files',      desc: 'File Manager',         keywords: ['file','folder','browser','explorer','nautilus'],       icon: I.files },
    { name: 'Terminal',   desc: 'Shell',                keywords: ['shell','cli','console','bash','zsh'], shortcut: '⌘ T', icon: I.terminal },
    { name: 'VS Code',    desc: 'Code Editor',          keywords: ['code','editor','vscode','visual','studio'],             icon: I.vscode },
    { name: 'Slack',      desc: 'Team Messaging',       keywords: ['chat','messaging','team','work'],                       icon: I.slack },
    { name: 'Spotify',    desc: 'Music Player',         keywords: ['music','audio','player','podcast'],                     icon: I.spotify },
    { name: 'Settings',   desc: 'System Preferences',   keywords: ['preferences','config','system','control'],              icon: I.settings },
    { name: 'Calculator', desc: 'Math & Conversions',   keywords: ['math','calc','numbers'],                                icon: I.calc },
    { name: 'Calendar',   desc: 'Schedule & Events',    keywords: ['date','event','schedule','time'],                       icon: I.calendar },
    { name: 'Mail',       desc: 'Email Client',         keywords: ['email','inbox','letter','message'],                     icon: I.mail },
    { name: 'Discord',    desc: 'Voice & Text Chat',    keywords: ['chat','voice','gaming','community'],                    icon: I.discord },
    { name: 'Obsidian',   desc: 'Notes & Knowledge Base', keywords: ['notes','markdown','writing','wiki'],                  icon: I.obsidian },
    { name: 'GIMP',       desc: 'Image Editor',         keywords: ['image','photo','graphics','edit'],                      icon: I.gimp },
    { name: 'Blender',    desc: '3D Modeling',          keywords: ['3d','model','render','animation'],                      icon: I.blender },
    { name: 'Steam',      desc: 'Game Library',         keywords: ['games','gaming','library','valve'],                     icon: I.steam },
  ];

  // ── State ────────────────────────────────────────────────────────────
  const $q = document.getElementById('q');
  const $query = document.getElementById('query');
  const $results = document.getElementById('results');
  const $noMatch = document.getElementById('noMatch');
  const $noMatchQ = document.getElementById('noMatchQ');
  const $emptyFoot = document.getElementById('emptyFoot');
  const $resultsFoot = document.getElementById('resultsFoot');
  const $resultsCount = document.getElementById('resultsCount');

  let matches = [];
  let selected = 0;

  // ── Matching ─────────────────────────────────────────────────────────
  function score(app, query) {
    const q = query.toLowerCase();
    const name = app.name.toLowerCase();
    if (name.startsWith(q)) return 100 - name.length;
    const idx = name.indexOf(q);
    if (idx !== -1) return 60 - idx - name.length * 0.1;
    for (const kw of app.keywords) {
      if (kw.toLowerCase().includes(q)) return 30;
    }
    return -1;
  }

  // Build a .name element with a highlighted match range, using DOM nodes
  function renderName(name, query) {
    const wrap = document.createElement('div');
    wrap.className = 'name';
    if (!query) { wrap.textContent = name; return wrap; }
    const low = name.toLowerCase();
    const q = query.toLowerCase();
    const idx = low.indexOf(q);
    if (idx === -1) { wrap.textContent = name; return wrap; }
    if (idx > 0) wrap.appendChild(document.createTextNode(name.slice(0, idx)));
    const hit = document.createElement('span');
    hit.className = 'match';
    hit.textContent = name.slice(idx, idx + q.length);
    wrap.appendChild(hit);
    if (idx + q.length < name.length) {
      wrap.appendChild(document.createTextNode(name.slice(idx + q.length)));
    }
    return wrap;
  }

  // Construct one result row via DOM (no innerHTML)
  function renderRow(app, i, query) {
    const row = document.createElement('div');
    row.className = 'row' + (i === selected ? ' selected' : '');
    row.dataset.i = String(i);

    const iconWrap = document.createElement('div');
    iconWrap.className = 'app-icon';
    iconWrap.appendChild(makeIcon(app.icon));

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.appendChild(renderName(app.name, query));
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.textContent = app.desc;
    meta.appendChild(desc);

    const shortcut = document.createElement('div');
    shortcut.className = 'shortcut';
    if (app.shortcut) shortcut.textContent = app.shortcut;

    const enter = document.createElement('div');
    enter.className = 'enter';
    const enterSvg = makeIcon(I.enter);
    enterSvg.setAttribute('stroke-width', '1.8');
    enterSvg.setAttribute('width', '12');
    enterSvg.setAttribute('height', '12');
    enter.appendChild(enterSvg);

    row.append(iconWrap, meta, shortcut, enter);
    return row;
  }

  // ── Render ───────────────────────────────────────────────────────────
  function render() {
    const query = $q.value.trim();

    // Clear previous rows
    while ($results.firstChild) $results.removeChild($results.firstChild);

    if (!query) {
      matches = [];
      $results.classList.remove('show');
      $noMatch.classList.remove('show');
      $query.classList.remove('has-results');
      $emptyFoot.style.display = 'flex';
      $resultsFoot.style.display = 'none';
      return;
    }

    matches = APPS
      .map(app => ({ app, s: score(app, query) }))
      .filter(m => m.s >= 0)
      .sort((a, b) => b.s - a.s)
      .map(m => m.app);

    if (matches.length === 0) {
      $results.classList.remove('show');
      $noMatchQ.textContent = `"${query}"`;
      $noMatch.classList.add('show');
      $query.classList.add('has-results');
      $emptyFoot.style.display = 'none';
      $resultsFoot.style.display = 'none';
      return;
    }

    $noMatch.classList.remove('show');
    $query.classList.add('has-results');
    $emptyFoot.style.display = 'none';
    $resultsFoot.style.display = 'flex';
    $resultsCount.textContent =
      matches.length + ' ' + (matches.length === 1 ? 'match' : 'matches');

    selected = Math.min(selected, matches.length - 1);
    if (selected < 0) selected = 0;

    matches.forEach((app, i) => $results.appendChild(renderRow(app, i, query)));
    $results.classList.add('show');

    $results.querySelectorAll('.row').forEach(row => {
      row.addEventListener('click', () => {
        selected = parseInt(row.dataset.i, 10);
        launch();
      });
      row.addEventListener('mouseenter', () => {
        selected = parseInt(row.dataset.i, 10);
        updateSelected();
      });
    });

    scrollSelectedIntoView();
  }

  function updateSelected() {
    $results.querySelectorAll('.row').forEach((row, i) => {
      row.classList.toggle('selected', i === selected);
    });
  }

  function scrollSelectedIntoView() {
    const row = $results.querySelector('.row.selected');
    if (!row) return;
    const rTop = row.offsetTop;
    const rBot = rTop + row.offsetHeight;
    const vTop = $results.scrollTop;
    const vBot = vTop + $results.clientHeight;
    if (rTop < vTop) $results.scrollTop = rTop;
    else if (rBot > vBot) $results.scrollTop = rBot - $results.clientHeight;
  }

  function launch() {
    const app = matches[selected];
    if (!app) return;
    const row = $results.querySelector('.row.selected');
    if (row) {
      row.style.background = 'rgba(227,227,227,0.14)';
      setTimeout(() => { row.style.background = ''; }, 140);
    }
    setTimeout(() => {
      $q.value = '';
      selected = 0;
      render();
      $q.focus();
    }, 200);
  }

  // ── Events ───────────────────────────────────────────────────────────
  $q.addEventListener('input', () => {
    selected = 0;
    render();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if ($q.value) { $q.value = ''; render(); }
      $q.focus();
      return;
    }
    if (e.key === 'ArrowDown') {
      if (!matches.length) return;
      e.preventDefault();
      selected = (selected + 1) % matches.length;
      updateSelected();
      scrollSelectedIntoView();
      return;
    }
    if (e.key === 'ArrowUp') {
      if (!matches.length) return;
      e.preventDefault();
      selected = (selected - 1 + matches.length) % matches.length;
      updateSelected();
      scrollSelectedIntoView();
      return;
    }
    if (e.key === 'Enter') {
      if (matches.length) launch();
    }
  });

  $query.addEventListener('mousedown', (e) => {
    if (e.target !== $q) e.preventDefault();
    $q.focus();
  });

  // Auto-reload support (?reload=1) — matches wifi-overlay.html
  if (new URLSearchParams(location.search).get('reload') === '1') {
    let last = null;
    setInterval(async () => {
      try {
        const r = await fetch(location.pathname, { method: 'HEAD', cache: 'no-store' });
        const m = r.headers.get('last-modified');
        if (last && m && m !== last) location.reload();
        last = last || m;
      } catch (e) {}
    }, 1000);
  }

  render();
  $q.focus();
</script>
</body>
</html>
