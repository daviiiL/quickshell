<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lock Screen — Preview</title>
<style>
  :root {
    /* surfaces */
    --bar-bg: #0a0a0a;
    --surface: #141218;
    --surface-container-lowest: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container: #211f26;
    --surface-container-high: #2b2930;

    /* text */
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;

    /* lines */
    --hair: #272727;
    --hair-hot: #3a3a3a;

    /* accents / status */
    --accent: #e3e3e3;
    --bar-accent: #e3e3e3;
    --live: #5dc70a;
    --stale: #f59e0b;
    --warn: #ffd4ab;
    --err: #f2b8b5;

    /* geometry */
    --radius-sm: 3px;
    --radius-md: 4px;
    --hair-w: 1px;
    --strip-h: 40px;
  }

  :root[data-theme="light"] {
    --bar-bg: #e4e0e9;
    --surface: #f5f2f7;
    --surface-container-lowest: #fbf9fc;
    --surface-container-low: #eee9f0;
    --surface-container: #e3dee6;
    --surface-container-high: #d4cfd9;

    --ink: #1c1820;
    --ink-dim: #5b5764;
    --ink-dimmer: #827e8a;
    --ink-faint: #a8a4b0;

    --hair: #d6d1dc;
    --hair-hot: #bcb7c2;

    --accent: #1c1820;
    --bar-accent: #1c1820;
    --live: #3d8f0a;
    --stale: #a85d0a;
    --warn: #a65a1c;
    --err: #b3261e;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--surface-container-lowest);
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* top preview-chrome strip (matches shell.html convention) */
  .strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--strip-h);
    background: var(--bar-bg);
    border-bottom: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 1000;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .strip h1 {
    margin: 0;
    font-size: 10px;
    font-weight: 500;
    color: var(--ink-dimmer);
    letter-spacing: 0.18em;
  }
  .strip .toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    height: 24px;
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-sm);
    color: var(--ink-dimmer);
    cursor: pointer;
    user-select: none;
    background: transparent;
  }
  .strip .toggle input { display: none; }
  .strip .toggle:has(input:checked) {
    background: var(--surface-container-low);
    color: var(--ink);
    border-color: var(--hair-hot);
  }
  .strip .toggle:has(input:checked)::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
  }
  .strip .toggle .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.55;
  }

  /* Lock canvas fills everything below the strip */
  .canvas {
    position: relative;
    margin-top: var(--strip-h);
    height: calc(100vh - var(--strip-h));
    overflow: hidden;
    background: var(--surface-container-lowest);
  }

  /* Hairline grid overlay, masked radially */
  .canvas::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--hair) 1px, transparent 1px),
      linear-gradient(90deg, var(--hair) 1px, transparent 1px);
    background-size: 56px 56px;
    opacity: 0.32;
    mask-image: radial-gradient(ellipse at 50% 40%, black 8%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at 50% 40%, black 8%, transparent 80%);
    pointer-events: none;
  }

  /* Top and bottom hairlines */
  .hair-top, .hair-bot {
    position: absolute; left: 0; right: 0;
    height: var(--hair-w);
    background: var(--hair);
    pointer-events: none;
  }
  .hair-top { top: 0; }
  .hair-bot { bottom: 0; }
  .hair-top::before {
    content: "";
    position: absolute; left: 0; top: 0;
    width: 45%; height: var(--hair-w);
    background: linear-gradient(90deg, rgba(227,227,227,0.55), transparent);
  }
  :root[data-theme="light"] .hair-top::before {
    background: linear-gradient(90deg, rgba(28,24,32,0.55), transparent);
  }

  /* Clock — modest, not a hero */
  .clock {
    position: absolute;
    left: 5.5%;
    top: 14%;
    font-weight: 200;
    font-size: clamp(24px, 1.6vw, 40px);
    line-height: 0.88;
    letter-spacing: -0.035em;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    user-select: none;
  }

  /* Date line — scaled up for 4K */
  .date-line {
    position: absolute;
    left: 5.5%;
    top: 54%;
    font-size: clamp(12px, 0.8vw, 20px);
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--ink-dimmer);
    user-select: none;
  }
  .date-line b { color: var(--ink); font-weight: 500; }
  .date-line .sep { color: var(--hair-hot); margin: 0 0.6em; }

  /* Chips row — scaled up for 4K */
  .chips {
    position: absolute;
    right: 4%;
    top: 7%;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .chip {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border: var(--hair-w) solid var(--hair);
    border-radius: 3px;
    color: var(--ink-dim);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    height: 28px;
  }
  .chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 2px rgba(93,199,10,0.22);
  }
  :root[data-theme="light"] .chip .dot {
    box-shadow: 0 0 0 2px rgba(61,143,10,0.22);
  }
  .chip.warn { color: var(--warn); border-color: var(--hair-hot); }

  /* Password field — scaled up for 4K */
  .auth {
    position: absolute;
    left: 5.5%;
    bottom: 9%;
    width: 48%;
    max-width: 640px;
    padding-left: 14px;
    border-left: 2px solid var(--accent);
  }
  .auth .label {
    font-size: 14px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink-dimmer);
    margin: 0 0 10px;
  }
  .auth.failed .label {
    color: var(--err);
  }
  .auth .field {
    height: 46px;
    border: var(--hair-w) solid var(--hair-hot);
    background: var(--surface-container-low);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 6px;
    font-size: 16px;
    color: var(--ink);
  }
  .auth .dots {
    display: inline-flex;
    gap: 5px;
  }
  .auth .dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ink);
  }
  .auth .cursor {
    width: 1.2px; height: 18px;
    background: var(--accent);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* User badge — scaled up for 4K */
  .user {
    position: absolute;
    right: 4%;
    bottom: 9%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user .avatar {
    width: 32px; height: 32px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--surface-container-high), var(--surface-container-low));
    border: 1px solid var(--hair);
    display: grid;
    place-items: center;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .user .who {
    font-size: 14px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="strip">
    <h1>LOCK SCREEN · PREVIEW</h1>
    <label class="toggle">
      <input type="checkbox" id="theme-toggle" />
      <span class="dot"></span>
      <span>LIGHT</span>
    </label>
  </div>

  <div class="canvas">
    <div class="hair-top"></div>

    <div class="chips">
      <span class="chip"><span class="dot"></span>ETH</span>
      <span class="chip">87%</span>
      <span class="chip">US</span>
    </div>

    <div class="clock">04:17</div>
    <div class="date-line">
      MON <b>20 APR</b><span class="sep">·</span>W17
    </div>

    <div class="auth">
      <div class="label">PASSWORD</div>
      <div class="field">
        <span class="dots">
          <span></span><span></span><span></span><span></span>
        </span>
        <span class="cursor"></span>
      </div>
    </div>

    <div class="user">
      <div class="avatar">DA</div>
      <div class="who">DAVIDAS</div>
    </div>

    <div class="hair-bot"></div>
  </div>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('change', () => {
      root.dataset.theme = toggle.checked ? 'light' : 'dark';
    });
  </script>
</body>
</html>
