<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gemini Chat — Preview</title>
<style>
  :root {
    /* surfaces */
    --bar-bg: #0a0a0a;
    --panel-bg: #141218;
    --surface-container-lowest: #0f0f13;
    --surface-container-low: #1d1b20;
    --surface-container: #211f26;
    --surface-container-high: #2b2930;

    /* text */
    --ink: #e6e0e9;
    --ink-dim: #8f8f8f;
    --ink-dimmer: #6b6b6b;
    --ink-faint: #4d4d4d;

    /* lines */
    --hair: #272727;
    --hair-hot: #3a3a3a;

    /* accents / status */
    --accent: #e3e3e3;
    --bar-accent: #e3e3e3;
    --live: #7eb28e;
    --warn: #ddc196;
    --err: #d69c96;
    --violet: #c4bae0;

    /* desktop backdrop */
    --desktop-base: #07070a;
    --desktop-warm: #1a1820;
    --desktop-cool: #121016;

    /* geometry */
    --panel-w: 400px;
    --strip-h: 40px;
    --radius-sm: 3px;
    --radius-md: 4px;
    --radius-lg: 8px;
    --hair-w: 1px;

    /* type scale — 1:1 port of common/Theme.qml › FontSize (px = base + offset) */
    --font-offset: 0px;                          /* mirrors GlobalStates.fontOffset */
    --font-xxs: calc( 7px + var(--font-offset));
    --font-xs:  calc(10px + var(--font-offset));
    --font-sm:  calc(12px + var(--font-offset));
    --font-md:  calc(14px + var(--font-offset));
    --font-lg:  calc(16px + var(--font-offset));
    --font-xl:  calc(18px + var(--font-offset));
    --font-xxl: calc(20px + var(--font-offset));
  }

  :root[data-theme="light"] {
    --bar-bg: #e4e0e9;
    --panel-bg: #f5f2f7;
    --surface-container-lowest: #fbf9fc;
    --surface-container-low: #eee9f0;
    --surface-container: #e3dee6;
    --surface-container-high: #d4cfd9;

    --ink: #1c1820;
    --ink-dim: #5b5764;
    --ink-dimmer: #827e8a;
    --ink-faint: #a8a4b0;

    --hair: #d6d1dc;
    --hair-hot: #bcb7c2;

    --accent: #1c1820;
    --bar-accent: #1c1820;
    --live: #4a805c;
    --warn: #96743a;
    --err: #a85650;
    --violet: #7462a4;

    --desktop-base: #dcd7e0;
    --desktop-warm: #ebe6ee;
    --desktop-cool: #d4d7dc;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 75% 25%, var(--desktop-warm) 0%, transparent 60%),
      radial-gradient(900px 500px at 20% 85%, var(--desktop-cool) 0%, transparent 60%),
      var(--desktop-base);
    font-family: "Inter", "Inter Nerd Font Propo", system-ui, -apple-system, sans-serif;
    font-size: var(--font-md);   /* base — Theme.qml md (14px) */
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── fixed preview chrome strip ─────────────────────────────────────── */
  .strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--strip-h);
    background: var(--bar-bg);
    border-bottom: var(--hair-w) solid var(--hair);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 1000;
    font-size: var(--font-xs);
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }
  .strip h1 {
    margin: 0;
    font-size: var(--font-xs);
    font-weight: 500;
    color: var(--ink-dimmer);
    letter-spacing: 0.18em;
  }
  .strip .pills { display: flex; gap: 6px; align-items: center; }
  .sep { width: 1px; height: 18px; background: var(--hair); margin: 0 4px; }

  .btn, .toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    height: 24px;
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-sm);
    color: var(--ink-dimmer);
    cursor: pointer;
    font-size: var(--font-xs);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: transparent;
    font-family: inherit;
    user-select: none;
    transition: color .18s, border-color .18s, background .18s;
  }
  .btn:hover, .toggle:hover { color: var(--ink); border-color: var(--hair-hot); }
  .toggle input { display: none; }
  .toggle .dot {
    width: 7px; height: 7px; border-radius: 50%;
    border: 1px solid var(--ink-faint);
    transition: background .18s, border-color .18s;
  }
  .toggle input:checked + .dot { background: var(--live); border-color: var(--live); }
  .btn .dot { width: 6px; height: 6px; border-radius: 1px; background: currentColor; }
  .btn.danger:hover { color: var(--err); border-color: var(--err); }

  /* ── the docked sidebar ─────────────────────────────────────────────── */
  .panel {
    position: fixed;
    top: var(--strip-h);
    left: 0;
    bottom: 0;
    width: var(--panel-w);
    background: var(--panel-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 12px 0 40px rgba(0,0,0,0.45);
  }
  :root[data-theme="light"] .panel { box-shadow: 12px 0 40px rgba(0,0,0,0.12); }
  /* right-edge hair + top accent catch, mirrors RightPanel.qml */
  .panel::after {
    content: ""; position: absolute; top: 0; right: 0; bottom: 0;
    width: var(--hair-w); background: var(--hair);
  }
  .panel .catch {
    position: absolute; top: 0; right: 0; width: 180px; height: var(--hair-w);
    background: linear-gradient(270deg, color-mix(in srgb, var(--bar-accent) 55%, transparent), transparent);
    z-index: 3;
  }
  .panel > .toprule {
    position: absolute; top: 0; left: 0; right: 0; height: var(--hair-w);
    background: var(--hair); z-index: 2;
  }

  /* ── hero: the matrix field ─────────────────────────────────────────── */
  .hero {
    position: relative;
    height: 208px;
    flex: 0 0 auto;
    overflow: hidden;
    background:
      radial-gradient(120% 90% at 50% 32%, rgba(255,255,255,0.02), transparent 70%),
      var(--surface-container-lowest);
  }
  .hero canvas { display: block; width: 100%; height: 100%; }
  /* soft fade of the field into the panel below */
  .hero .veil {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 55%, var(--panel-bg) 100%);
  }
  .hero .wordmark {
    position: absolute; left: 18px; top: 16px;
    font-size: var(--font-sm); letter-spacing: 0.30em; text-transform: uppercase;
    color: var(--ink-dimmer); z-index: 4;
  }
  .hero .verchip {
    position: absolute; right: 18px; top: 16px;
    font-size: var(--font-xs); letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ink-faint); z-index: 4;
  }

  /* ── status readout under the hero ──────────────────────────────────── */
  .status {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 13px 18px;
    border-top: var(--hair-w) solid var(--hair);
    border-bottom: var(--hair-w) solid var(--hair);
    font-size: var(--font-xs);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .status .brand { color: var(--ink); font-weight: 600; letter-spacing: 0.22em; }
  .status .statechip {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-dim);
  }
  .status .statedot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--st-color, var(--ink-faint));
    box-shadow: 0 0 8px var(--st-color, transparent);
    transition: background .3s, box-shadow .3s;
  }
  .status .spring { flex: 1; }
  .status .meta { color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .status .meta b { color: var(--ink-dim); font-weight: 500; }

  /* ── chat log ───────────────────────────────────────────────────────── */
  .log {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 18px 12px;
    display: flex; flex-direction: column; gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--hair-hot) transparent;
  }
  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-thumb { background: var(--hair-hot); border-radius: 3px; }

  .msg { display: flex; gap: 10px; max-width: 100%; animation: rise .28s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .msg .avatar {
    flex: 0 0 auto; width: 22px; height: 22px; margin-top: 1px;
    display: grid; place-items: center; color: var(--violet);
  }
  .msg .avatar svg { width: 20px; height: 20px;
    filter: drop-shadow(0 0 4px color-mix(in srgb, var(--violet) 45%, transparent)); }
  .bubble {
    padding: 10px 13px;
    border-radius: var(--radius-lg);
    font-size: var(--font-md);
    line-height: 1.5;
    color: var(--ink);
    max-width: 300px;
    word-wrap: break-word;
  }
  .msg.bot { align-self: flex-start; }
  .msg.bot .bubble {
    background: var(--surface-container-low);
    border: var(--hair-w) solid var(--hair);
    border-top-left-radius: var(--radius-sm);
    position: relative;
  }
  .msg.bot .bubble::before {
    content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--violet); border-radius: 2px; opacity: .55;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.user .bubble {
    background: var(--surface-container-high);
    border-top-right-radius: var(--radius-sm);
  }
  .msg.user .avatar { display: none; }
  .msg .who {
    font-size: var(--font-xs); letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dimmer); margin-bottom: 3px; display: block;
  }
  .caret { display: inline-block; width: 7px; height: 1.05em; vertical-align: -2px;
           background: var(--violet); margin-left: 1px; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .sysline {
    align-self: center; text-align: center;
    font-size: var(--font-xs); letter-spacing: 0.20em; text-transform: uppercase;
    color: var(--ink-faint);
    padding: 2px 0;
  }
  .sysline b { color: var(--ink-dim); font-weight: 500; }

  /* ── composer ───────────────────────────────────────────────────────── */
  .composer {
    flex: 0 0 auto;
    border-top: var(--hair-w) solid var(--hair);
    padding: 14px 16px 16px;
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface-container-lowest);
  }
  .composer .field {
    flex: 1;
    display: flex; align-items: center;
    background: var(--surface-container-low);
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-md);
    padding: 0 10px;
    transition: border-color .18s;
  }
  .composer .field:focus-within { border-color: var(--hair-hot); }
  .composer input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--ink); font-family: inherit; font-size: var(--font-md);
    height: 38px;
  }
  .composer input::placeholder { color: var(--ink-faint); }
  .composer .send {
    width: 38px; height: 38px; flex: 0 0 auto;
    display: grid; place-items: center;
    border: var(--hair-w) solid var(--hair);
    border-radius: var(--radius-md);
    background: var(--surface-container);
    color: var(--ink-dim); cursor: pointer;
    transition: color .18s, border-color .18s, background .18s;
  }
  .composer .send:hover { color: var(--violet); border-color: var(--violet); }
  .composer .send svg { width: 16px; height: 16px; }
  .panel.offline .composer { opacity: .45; }
  .panel.offline .composer .field { border-style: dashed; }
  .panel.offline .composer input { pointer-events: none; }
  .panel.offline .composer .send { pointer-events: none; }
  .composer.shake { animation: shake .4s ease; }
  @keyframes shake {
    0%,100%{ transform: translateX(0);} 20%{ transform: translateX(-5px);}
    40%{ transform: translateX(5px);} 60%{ transform: translateX(-3px);} 80%{ transform: translateX(3px);}
  }
</style>
</head>
<body>

  <header class="strip">
    <h1>gemini-chat.html</h1>
    <div class="pills">
      <button class="btn" id="mark"><span class="dot"></span>rhombus</button>
      <button class="btn" id="reboot"><span class="dot"></span>reboot</button>
      <button class="btn danger" id="power"><span class="dot"></span>drop</button>
      <span class="sep"></span>
      <label class="toggle"><input type="checkbox" data-theme-toggle><span class="dot"></span>light</label>
    </div>
  </header>

  <aside class="panel" id="panel">
    <div class="toprule"></div>
    <div class="catch"></div>

    <div class="hero">
      <span class="wordmark">◆ gemini</span>
      <span class="verchip">flash · 2.0</span>
      <canvas id="matrix"></canvas>
      <div class="veil"></div>
    </div>

    <div class="status">
      <span class="brand">GEMINI</span>
      <span class="statechip"><span class="statedot" id="stdot"></span><span id="ststate">boot</span></span>
      <span class="spring"></span>
      <span class="meta"><b id="stping">—</b> ms</span>
    </div>

    <div class="log" id="log"></div>

    <div class="composer" id="composer">
      <div class="field">
        <input id="input" type="text" placeholder="Message Gemini…" autocomplete="off" />
      </div>
      <button class="send" id="send" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h13M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </aside>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  Matrix field — a center-origin square lattice driven by a connection
//  lifecycle state machine. Motion is radial ripple physics; color is a
//  signal of connection health.
// ═══════════════════════════════════════════════════════════════════════

const cv  = document.getElementById('matrix');
const ctx = cv.getContext('2d');

const PITCH = 11, CELL = 8;          // lattice pitch & square size (px)
let W = 0, H = 0, cx = 0, cy = 0, maxR = 1, spanR = 1, R0 = 1, feather = 8;
let cells = [];

// ── logo marks — the silhouette the lattice fills (switchable live) ────
//    env(theta) → 0..1 radius envelope: 1 at a point, ~core at the pinches.
const _abs = Math.abs, _pw = Math.pow, _cos = Math.cos, _sin = Math.sin;
const MARKS = {
  rhombus:  t => 1 / (_abs(_cos(t)) / 0.82 + _abs(_sin(t))),   // upright rhombus / diamond
  spark4:   t => 0.13 + 0.87 * _pw(_abs(_cos(2 * t)), 0.26),   // Gemini four-point spark (sharp)
  spark6:   t => 0.14 + 0.86 * _pw(_abs(_cos(3 * t)), 0.34),   // six-point star
  sparkle8: t => 0.13 + 0.87 * _pw(_abs(_cos(4 * t)), 0.42),   // eight-point sparkle
  burst:    t => 0.20 + 0.80 * _pw(_abs(_cos(6 * t)), 0.55),   // Claude-style radiating burst
};
const MARK_ORDER = ['rhombus', 'spark4', 'spark6', 'sparkle8', 'burst'];
let markName = 'rhombus';
let markFn = MARKS[markName];

// ── palette (re-read on theme change) ─────────────────────────────────
function rgb(v){ return v.split(',').map(Number); }
const PAL = {
  // muted, desaturated jewel tones — colour as a whisper, not a flood
  dark:  { ink:[228,226,232], construct:[196,220,244], amber:[221,193,150],
           green:[126,178,142], violet:[196,186,224], red:[214,156,150], floor:0.055 },
  light: { ink:[30,28,36],     construct:[70,96,134],   amber:[150,116,58],
           green:[74,128,92],  violet:[116,98,164],  red:[168,86,80],  floor:0.10 },
};
let P = PAL.dark;
function refreshPalette(){
  P = document.documentElement.getAttribute('data-theme') === 'light' ? PAL.light : PAL.dark;
}

// ── layout ────────────────────────────────────────────────────────────
function layout(){
  const dpr  = Math.min(window.devicePixelRatio || 1, 2);
  const rect = cv.getBoundingClientRect();
  W = rect.width; H = rect.height;
  cv.width  = Math.round(W * dpr);
  cv.height = Math.round(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cx = W / 2; cy = H * 0.46;
  R0     = Math.min(W, H) * 0.42;   // reach of the star points
  spanR  = R0;
  feather = PITCH;
  maxR   = Math.hypot(Math.max(cx, W - cx), Math.max(cy, H - cy)) + PITCH;

  const cols = Math.ceil(W / PITCH), rows = Math.ceil(H / PITCH);
  const offX = (W - cols * PITCH) / 2 + PITCH / 2;
  const offY = (H - rows * PITCH) / 2 + PITCH / 2;
  cells = [];
  for (let j = 0; j < rows; j++){
    for (let i = 0; i < cols; i++){
      const x = offX + i * PITCH, y = offY + j * PITCH;
      const dx = x - cx, dy = y - cy;
      const r = Math.hypot(dx, dy);
      const th  = Math.atan2(dy, dx);
      const env = markFn(th);                     // 0..1 mark envelope (1 at the tips)
      const mask = smooth(R0 * env - r, feather); // soft silhouette
      if (mask <= 0.001) continue;                // keep only cells inside the mark
      const seed = Math.sin(i * 12.9898 + j * 78.233) * 43758.5453;
      cells.push({ x, y, r, th, env, mask, nx: dx / R0, ny: dy / R0, h: seed - Math.floor(seed) });
    }
  }
}

// ── ripple / packet pools ─────────────────────────────────────────────
let ripples = [];   // {t0, speed, band, amp, col}
let packets = [];   // {t0, ang, speed}   (handshake data motes)
function emit(o){ ripples.push(Object.assign({ t0: T, startR: 0, dir: 1, speed: 110, band: 16, amp: 0.6, col: null }, o)); }
function packet(){ packets.push({ t0: T, ang: Math.random() * Math.PI * 2, speed: 120 + Math.random()*60 }); }

// ── state machine ─────────────────────────────────────────────────────
const STATES = {
  boot:      { label:'constructing',    color:'construct', target:'construct' },
  handshake: { label:'acquiring remote',color:'amber',     target:'amber' },
  idle:      { label:'online',          color:'green',     target:'green' },
  thinking:  { label:'thinking',        color:'violet',    target:'violet' },
  answering: { label:'responding',      color:'violet',    target:'violet' },
  offline:   { label:'offline',         color:'red',       target:'red' },
};
let state = 'boot';
let stateEnter = 0;          // time state was entered
let accent = [140,150,170];  // eased current accent rgb
let emitAcc = 0;             // emission accumulator (ms)
let energy = 0;              // smooth 0..1 activity level (eased per state)
let thinkAmt = 0;            // smooth 0..1 "thinking" blend (drives the inward flow)

function setState(s){
  state = s;
  stateEnter = T;
  const st = STATES[s];
  document.getElementById('ststate').textContent = st.label;
  const dot = document.getElementById('stdot');
  const c = P[st.color];
  document.documentElement.style.setProperty('--st-color', `rgb(${c[0]},${c[1]},${c[2]})`);
  document.getElementById('stdot').style.setProperty('--st-color', `rgb(${c[0]},${c[1]},${c[2]})`);
}

// ── helpers ───────────────────────────────────────────────────────────
function lerp(a,b,t){ return a + (b-a)*t; }
function mix(a,b,t){ return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)]; }
function hsl(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255)];
}

// ── the frame ─────────────────────────────────────────────────────────
let T = 0, last = 0;
function frame(now){
  const dt = last ? now - last : 16; last = now; T = now;

  // accent easing toward the current state's target color
  const tgt = P[STATES[state].target];
  const e = Math.min(1, dt * 0.005);
  accent = mix(accent, tgt, e);

  // per-state ripple emission
  emitAcc -= dt;
  const since = T - stateEnter;
  let bootP = 0, collapseP = 0, front = -1, frontCol = null, energyTarget = 0.12;

  if (state === 'boot'){
    bootP = Math.min(1, since / 1500);
    front = bootP * spanR;
    frontCol = hsl(lerp(210, 155, bootP), 48, 70);   // muted ice → sage spectral sweep
    energyTarget = 0.25;
    if (bootP >= 1) toHandshake();
  } else if (state === 'handshake'){
    energyTarget = 0.5;
    // reaching OUT for the remote — rhythmic amber pings + data motes flung past the tips
    if (emitAcc <= 0){ emit({ amp:0.7, speed:150, band:12, col:P.amber }); packet(); if (Math.random() < 0.6) packet(); emitAcc = 720; }
  } else if (state === 'idle'){
    energyTarget = 0.18;
    // a slow soft heartbeat keeps the stone breathing
    if (emitAcc <= 0){ emit({ amp:0.24, speed:64, band:26, col:P.green }); emitAcc = 4000; }
  } else if (state === 'thinking'){
    energyTarget = 0.85;
    // no discrete pulses — a smooth continuous inward flow (below) is the thinking motion
  } else if (state === 'answering'){
    energyTarget = 0.5;
    // steady OUTWARD emission between token pulses — streaming out
    if (emitAcc <= 0){ emit({ amp:0.3, speed:150, band:18, col:P.violet }); emitAcc = 680; }
  } else if (state === 'offline'){
    collapseP = Math.min(1, since / 1100);
    front = (1 - collapseP) * spanR;
    frontCol = P.red;
    energyTarget = 0.0;
  }

  // ease the activity level — continuous states glide up/down, never pop
  energy += (energyTarget - energy) * Math.min(1, dt * 0.004);
  thinkAmt += (((state === 'thinking') ? 1 : 0) - thinkAmt) * Math.min(1, dt * 0.003);

  // reap dead ripples / packets (ripples travel out OR in, per r.dir)
  ripples = ripples.filter(r => {
    const rad = r.startR + r.dir * r.speed * (T - r.t0);
    return r.dir > 0 ? (rad - r.band * 3 < spanR * 1.3) : (rad + r.band * 3 > 0);
  });
  packets = packets.filter(p => (p.speed * (T - p.t0)) < spanR * 1.9);

  // centre core — steady & gentle; brightness scales with energy, no strobing
  const coreR = spanR * 0.5;
  const corePulse = (0.16 + energy * 0.30) * (0.55 + 0.45 * Math.sin(T * 0.0022));

  // idle breathing envelope
  const breathe = 0.5 + 0.5 * Math.sin(T * 0.0011);

  // gem key light — drifts gently while idle so the stone feels alive (no sweep)
  const LIGHT = -2.15 + (state === 'idle' ? 0.28 * Math.sin(T * 0.00035) : 0);

  // idle vitality — a soft glow that roams the four vertices, one at a time
  let twiVi = -1, twiPulse = 0, twiAng = 0;
  if (state === 'idle'){
    const tb = T / 2400, bucket = Math.floor(tb);
    const s0 = Math.sin(bucket * 127.1) * 43758.5453;
    twiVi    = Math.floor((s0 - Math.floor(s0)) * 4);
    twiAng   = twiVi * Math.PI / 2;
    twiPulse = Math.sin((tb - bucket) * Math.PI);       // 0 → 1 → 0 across the window
  }

  ctx.clearRect(0, 0, W, H);

  for (const c of cells){
    // silhouette mask × construction/collapse growth from the centre
    let grow = 1;
    if (state === 'boot')         grow = smooth(bootP * spanR - c.r, feather * 1.6);
    else if (state === 'offline') grow = smooth((1 - collapseP) * spanR - c.r, feather * 1.6);
    const reveal = c.mask * grow;
    if (reveal <= 0.001) continue;

    // ── structural brightness (the stone itself — renders neutral platinum) ──
    let bs = P.floor;
    bs += 0.09 * breathe * (0.5 + 0.5 * Math.sin(c.r / 16 - T * 0.0020));        // slow breath
    bs += 0.03 * c.h * Math.sin(T * 0.0018 + c.h * 6.283);                        // faint twinkle
    if (c.r < coreR) bs += corePulse * (1 - c.r / coreR);                        // centre core
    bs += 0.12 * c.env * (0.45 + 0.55 * Math.sin(T * 0.0016 + c.env * 2.2));      // vertex sparkle
    const gemLight = 0.5 + 0.5 * Math.cos(c.th - LIGHT);                          // directional key light
    const ridge = _pw(_abs(_cos(2 * c.th)), 6);                                  // ridges to the vertices
    bs += 0.08 * (0.22 + 0.78 * gemLight);                                        // ambient facet light
    bs += 0.16 * ridge * (0.35 + 0.65 * gemLight);                              // bright vertex ridges
    bs += 0.42 * Math.exp(-(c.r * c.r) / (2 * (spanR * 0.13) * (spanR * 0.13)));  // refractive core glint

    // ── dynamic brightness (the inner light — renders in the accent) ─────────
    let bd = 0;
    const flow  = 0.5 + 0.5 * Math.sin(c.r * 0.085 - T * (0.0026 + energy * 0.0026) + c.env * 1.6);
    const flow2 = 0.5 + 0.5 * Math.sin(c.r * 0.045 + T * 0.0018 - c.env * 2.0);
    bd += energy * 0.20 * flow * (0.55 + 0.45 * flow2);                           // energy flow
    if (thinkAmt > 0.01)                                                           // smooth inward thinking wave
      bd += thinkAmt * 0.22 * (0.5 + 0.5 * Math.sin(c.r * 0.075 + T * 0.0030 + c.env * 1.1));
    if (twiVi >= 0){                                                               // idle vertex glow
      const near = Math.max(0, Math.cos(c.th - twiAng));
      bd += 0.4 * twiPulse * Math.pow(near, 10) * Math.max(0, c.r / spanR - 0.35) * c.env;
    }

    let col = accent;

    // ripple contributions — each swells in over ~260ms so nothing pops
    for (const rp of ripples){
      const age = T - rp.t0;
      const rad = rp.startR + rp.dir * rp.speed * age;
      const d = c.r - rad;
      const g = Math.exp(-(d*d) / (2 * rp.band * rp.band));
      if (g > 0.004){
        const birth = Math.min(1, age / 260);
        const fade  = Math.max(0, Math.min(1, 1 - Math.abs(rad) / (spanR * 1.25)));
        const contrib = rp.amp * g * fade * birth;
        bd += contrib;
        if (rp.col) col = mix(col, rp.col, Math.min(1, contrib * 1.4));
      }
    }

    // construction / collapse leading edge glow
    if (front >= 0 && frontCol){
      const d = c.r - front;
      const g = Math.exp(-(d*d) / (2 * (PITCH*1.7) * (PITCH*1.7)));
      if (g > 0.01){ bd += g * 1.15; col = mix(col, frontCol, Math.min(1, g)); }
    }

    const b = bs + bd;
    const lit = Math.max(0, Math.min(1, b));
    // premium colour model: platinum stone, accent only where the inner light lives
    const cmix = Math.min(1, bd / (b + 0.0001));
    const neutral = mix(P.ink, col, 0.14);           // stone = platinum + a whisper of state colour
    const litCol = mix(neutral, col, cmix);
    const alpha = reveal * Math.max(P.floor * 0.9, lit);
    ctx.fillStyle = `rgba(${litCol[0]|0},${litCol[1]|0},${litCol[2]|0},${alpha.toFixed(3)})`;
    // each cell is itself a little diamond — a gem cut from gems
    const s = CELL * 0.66;
    ctx.beginPath();
    ctx.moveTo(c.x, c.y - s);
    ctx.lineTo(c.x + s, c.y);
    ctx.lineTo(c.x, c.y + s);
    ctx.lineTo(c.x - s, c.y);
    ctx.closePath();
    ctx.fill();
  }

  // handshake data motes travelling outward
  if (state === 'handshake'){
    for (const p of packets){
      const rad = p.speed * (T - p.t0);
      const x = cx + Math.cos(p.ang) * rad, y = cy + Math.sin(p.ang) * rad;
      const a = Math.max(0, 1 - rad / (spanR * 1.9));
      ctx.fillStyle = `rgba(${P.amber[0]},${P.amber[1]},${P.amber[2]},${(a*0.9).toFixed(3)})`;
      ctx.fillRect(x - 2, y - 2, 4, 4);
    }
  }

  requestAnimationFrame(frame);
}
function smooth(x, edge){ return Math.max(0, Math.min(1, x / edge + 0.5)); }

// ═══════════════════════════════════════════════════════════════════════
//  Lifecycle sequencing + chat
// ═══════════════════════════════════════════════════════════════════════
const log      = document.getElementById('log');
const input    = document.getElementById('input');
const panel    = document.getElementById('panel');
const composer = document.getElementById('composer');
let   seq = 0;                    // cancels in-flight sequences on reboot/drop
let   busy = false;
const wait = ms => new Promise(r => setTimeout(r, ms));

function sysline(html){
  const el = document.createElement('div');
  el.className = 'sysline'; el.innerHTML = html;
  log.appendChild(el); scroll();
}
function scroll(){ log.scrollTop = log.scrollHeight; }

function addMsg(who){
  const el = document.createElement('div');
  el.className = 'msg ' + (who === 'user' ? 'user' : 'bot');
  const spark = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L20.5 12 L12 22 L3.5 12 Z"/></svg>';
  const av = who === 'bot' ? '<div class="avatar">' + spark + '</div>' : '';
  el.innerHTML = av + '<div class="bubble"><span class="who">'
    + (who === 'user' ? 'you' : 'gemini') + '</span><span class="text"></span></div>';
  log.appendChild(el); scroll();
  return el.querySelector('.text');
}

async function streamBot(text, mine){
  setState('thinking');
  await wait(650 + Math.random()*500);
  if (mine !== seq) return;
  setState('answering');
  const node = addMsg('bot');
  const caret = document.createElement('span'); caret.className = 'caret';
  node.parentNode.appendChild(caret);   // caret trails the streaming text
  const words = text.split(' ');
  for (let i = 0; i < words.length; i++){
    if (mine !== seq){ caret.remove(); return; }
    node.textContent += (i ? ' ' : '') + words[i];
    emit({ amp:0.62, speed:175, band:16, col:P.violet });  // outward pulse per token
    scroll();
    await wait(38 + Math.random()*60);
  }
  caret.remove();
  if (mine !== seq) return;
  setState('idle');
  busy = false;
}

// scripted, sci-fi flavoured responses
function reply(q){
  const s = q.toLowerCase();
  if (/^(hi|hey|hello|yo|sup)/.test(s))
    return "Signal locked, I read you clearly. The lattice is warm and the link is green — what are we building?";
  if (/matrix|animation|logo|square|ripple/.test(s))
    return "That field up top isn't decoration — every square is a readout. It breathes when I'm idle, scrambles into ripples while I think, and pulses outward with each token I send back. Lose the remote and it collapses inward to the core.";
  if (/who|you|gemini|name/.test(s))
    return "I'm the Gemini bridge for your shell — a thin client over the remote model. This panel is the visible half of the handshake you just watched come online.";
  if (/matrix|hack|neo/.test(s))
    return "Follow the white rabbit. Or don't — either way the ripples keep radiating.";
  if (/color|colour|theme|dark|light/.test(s))
    return "Colour is a status channel here: amber while acquiring the remote, green when the link is healthy, violet as I reason, red the instant the connection drops. Flip the light toggle up top — the whole lattice re-tints live.";
  if (/\?$/.test(s.trim()))
    return "Good question. In the real build this streams straight from the remote model — here it's scripted so you can feel the motion: watch the field scramble while I 'think', then ripple out word by word as I answer.";
  return "Received. Notice the field scrambled the moment you hit send, then settled into a ripple that fires once per word as this streams in. That motion is the whole point of the mockup.";
}

function send(){
  const q = input.value.trim();
  if (!q) return;
  if (state === 'offline' || busy){
    composer.classList.remove('shake'); void composer.offsetWidth;
    composer.classList.add('shake');
    return;
  }
  input.value = '';
  const node = addMsg('user'); node.textContent = q;
  busy = true;
  streamBot(reply(q), seq);
}

// ── lifecycle transitions ─────────────────────────────────────────────
function toHandshake(){
  setState('handshake');
  const mine = seq;
  setTimeout(() => {
    if (mine !== seq) return;
    setState('idle');
    sysline('handshake complete · <b>link established</b>');
    busy = true;
    streamBot("Connection established. Remote model online, latency nominal. Ask me anything — or drop the link up top to watch the lattice collapse.", mine);
  }, 2100);
}

function boot(){
  seq++; const mine = seq;
  busy = true;
  ripples = []; packets = [];
  accent = [140,150,170];
  panel.classList.remove('offline');
  input.placeholder = 'Message Gemini…';
  log.innerHTML = '';
  sysline('cold boot · <b>constructing lattice</b>');
  setState('boot');   // frame() advances boot → handshake → idle automatically
}

function drop(){
  seq++;
  busy = false;
  ripples = []; packets = [];
  emit({ amp:1.1, speed:220, band:20, col: P.red });   // red flash
  setState('offline');
  panel.classList.add('offline');
  input.placeholder = 'connection lost — reconnect';
  document.getElementById('stping').textContent = '—';
  sysline('link dropped · <b>remote unreachable</b>');
  setPowerBtn(true);
}
function reconnect(){
  seq++;
  panel.classList.remove('offline');
  input.placeholder = 'Message Gemini…';
  sysline('re-acquiring remote…');
  toHandshake();
  setPowerBtn(false);
}

// ── latency ticker (fake ping while online) ───────────────────────────
setInterval(() => {
  const el = document.getElementById('stping');
  if (state === 'idle' || state === 'thinking' || state === 'answering'){
    el.textContent = (38 + Math.floor(Math.sin(T*0.001)*8 + Math.random()*22));
  } else if (state === 'handshake'){
    el.textContent = '···';
  }
}, 700);

// ── wiring ────────────────────────────────────────────────────────────
document.getElementById('send').addEventListener('click', send);
input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
document.getElementById('reboot').addEventListener('click', boot);

// cycle the logo mark live (spark4 → spark6 → sparkle8 → burst)
const markBtn = document.getElementById('mark');
markBtn.addEventListener('click', () => {
  markName = MARK_ORDER[(MARK_ORDER.indexOf(markName) + 1) % MARK_ORDER.length];
  markFn = MARKS[markName];
  markBtn.innerHTML = '<span class="dot"></span>' + markName;
  layout();   // rebuild the lattice against the new silhouette
});

const powerBtn = document.getElementById('power');
let dropped = false;
function setPowerBtn(off){
  dropped = off;
  powerBtn.classList.toggle('danger', !off);
  powerBtn.innerHTML = '<span class="dot"></span>' + (off ? 'reconnect' : 'drop');
}
powerBtn.addEventListener('click', () => { dropped ? reconnect() : drop(); });

// theme toggle — mirrors the other preview mockups
const themeToggle = document.querySelector('[data-theme-toggle]');
themeToggle.addEventListener('change', e => {
  if (e.target.checked) document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.removeAttribute('data-theme');
  refreshPalette();
  setState(state);   // re-tint status dot
});

window.addEventListener('resize', layout);

// ── go ────────────────────────────────────────────────────────────────
refreshPalette();
layout();
requestAnimationFrame(frame);
boot();

// ── dev livereload — auto-refresh when the file changes (http only) ────
if (location.protocol.startsWith('http')) {
  let lastMod = null;
  setInterval(async () => {
    try {
      const r = await fetch(location.href, { method: 'HEAD', cache: 'no-store' });
      const m = r.headers.get('Last-Modified');
      if (lastMod && m && m !== lastMod) location.reload();
      lastMod = m;
    } catch (e) {}
  }, 1000);
}
</script>
